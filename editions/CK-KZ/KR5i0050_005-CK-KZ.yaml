front:
  text: 呂帝詩集重刋道藏輯要
  hash: sha256:333119af9f035d33286950ca9253e9da7eb207922ba374a0c843c2c74b857a00
  markers:
  - {type: page-break, offset: 4, content: '', id: CK-KZ_KR5i0050_05p001a}
body:
  text: 詩集下卷孚佑上帝純陽吕祖天師著五言絕句示人四首道人元機透總是落珠圓四面靈光透何嘗一句偏浩氣貫斗牛一劍橫肩頭江山如畫裏蘆葉暗漁舟重曡關山路何時見道通新秋桐露滴人在小崆峒鶴舞松林際雲飛不礙山泉聲咽危石白日守柴關秋興四首秋風動江村夜靜月黃昏我將擕島嶼雲湧向崑崙啾啾寒夜蟲獨自鳴芳砌寄語懷幽人含情杳無際萬籟寂無聲獨自展幽抱島上有白雲聊以適吾好尋秋何處是月挂洞庭西放鶴看明月湖光一色齊上元卽事紫氣浮霄漢紅光射斗牛金花飛燦爛玉蝶滿枝頭囘山白雲何縹緲駕我歸蓬島深巷犬聲鳴花坊人事少秋暮雲薄天尤遠樹脫山乃瘦翛翛曲檻中熒火餘光透題仲子書齋寂靜書齋裡人來鳥不飛夕陽斜挂樹花氣襲朱衣題新月壇新月掛梅梢心淸百事消玄庭高卧醒酌酒聽雲簫明心一片淸虛境浮雲何處來蕭窗勤拂拭徐步上春臺養性松柏應長春幽人卧竹林淸心成一點靜裡覓天眞示蔡靜一明月池邊客山巓㙮畔人石菴仙隱處紙拾桂蟾神指迷二首烏兔東西走韶光日日新自來還自去忙殺世間人未雨牽羅補綢繆計己長寄言梁上燕空自集飛忙琴七弦飛雅操十指㵼松風喚覺浮生夢亭亭月印空棊黑白心難定何曾對面閒劫中多路險生死漫雙關書惆悵亡周後時儒漫檢尋各生仁與智孰到仲尼心畫可愛丹靑手無窮三昧功江山多少景都在寸心中示學人正直者必昌金仙從此始盡講服食功骨重身難起題王子書齋幽哉高士居看來如斗小西方丈六身化從一莖草立秋向夕凉風生說是秋已度著意去尋秋秋光在何處晚步向晚烟光逈歸鴉繞樹齊過橋尋野色囘看夕陽低見屏間聯句題此淸㪚廣陵曲硬黃逸少書莫言彈榻易腕下有功夫龍門古洞洞裏一懶人胸中別有天淸閒趣道士盛朝大樂仙示津源靜嘯非關動閒吟自合仙淡烟凝碧漢新雨鎻明川題像二首揮塵談天地憑虛識古今一聲長嘯後烟水滿胸襟我有松風賣世人買得無黃金三萬兩與爾一葫蘆偶吟開落花前夢眞空物外情雲衣風捲碎月扇水摇淸今古山河地裝成一線圖浩然三界外四大敢拘吾山僧明月高藜杖淸風冷衲衣竹深廬不見獨自引雲歸廣莫廣莫春千丈忘機鳥自棲人間桃李樹一任燕鶯啼悟道是道是非道見人不是人人道俱不見方得見道人七言絕句遊五臺山一重重上一重重形勢嵯峨聳碧空咳吐不教顚頂下恍疑甘雨降時龍遊九華山霽色初開麗九華山如列幛轉靑紗當時指出菩提路一徑波羅路不賖謁武當山誰向巖前鐵杵磨成功不憚用功多三千六百劫行滿鑄就降魔一太阿陟卧龍崗觀武侯遺跡有感梁父詩常抱膝吟潛龍時動躍龍迎奇謀遠出當年士遁甲今猶羡八門贈趙道士悟心容易息心難息得心源到處閒斗轉星移天欲曉白雲依舊覆靑山醒世二首名利驅人似火牛幾人平地把韁收但思古昔英雄輩那個功名直到頭一日淸閒一日仙何須世故太懸懸黃庭熟讀勤參悟白晝飛騰上九天覺夢天風吹我到江城萬戸無聲犬不驚可惜許多平旦氣都從夢裏誤平生覈玄大道當前無所名玄關一點會眞精谷神只要常虛在何慮玄玄不得成卽事燭燼香寒夜半時譙城更鼓故遲遲天風送與鸞輿至一笑凌雲任所之詠梅寶鼎香生帶紫霞靑煙一抺拂梅花賞心不待春三月雪裏含胎異種葩金丹金丹灼灼彩光浮直要功夫去取求萬壑千峯只一嘯這囘便是白雲樓元夕前二日厰閣風淸夜氣凉欄杆明月㪚雲光春宵何事千金價贏得仙人鶴影長示殷秉誠金爐香熖有時燼慾火奔騰無熄時安得塵心淸淨也漫將甘露染楊枝示體恕二絕句修眞豈必在年多正訣一聞出愛河捉住無毛𤢆猛虎管教玉液若淸波雖然吐納非眞要卻是一身六胍和自古大丹心性是先天不失更如何示蔭誠六絕句微雨輕塵潤九陔白雲漠漠障天階一聲長嘯開浮翳穩駕鸞車到此來翠鸞兩度武陵源不識奇因在眼前試把迷津頻指點休將好景浪傳言上元燈火屬何年處處繁華亦可憐珍重德馨綿世澤藜光午夜正高懸受道神仙愛浪遊幾將塵世等丹邱淸宵指引靡他願願在慈航渡濁流隱隱玄機洩妙言己將眞種露人前寛心待取時光到坐對金霞笑看天福地須憑心地修栽培莫負好貽謀鎡基正是當前物努力芸鋤得大收示允誠六絶句厯盡河沙界八千因緣之内覓因緣慈腸度世原無了寶筏頻施幾百年淸塵風雨灑蠻山駕得靑鸞出道關不爲松花來赴會多因指點破疑難客歸楚鄂已多時何事征車稅駕遲纂輯全書非易易經年方許吿成期莫道前言屬𣺌茫此中因果豈尋常但教心志無生悔自得通靈飲玉漿學道先須積善功善功多積道緣通知君夙有玄家種今日提㩦豈浪逢且將彚集細讐看好待縁成再付刋鶴馭約於元夕會漫將行止聽排安偶吟十四首半天風吼勢如雷夜氣橫空濁浪催江上濤聲驚急渡戯吹鐵笛跨鸞來何事馳驅塵界間豈貪浪跡學偷閒只因未了眾生願日日仙關閉不堅淸鐘聲遠漏聲長春靄行雲濕楚鄕法雨故教新潤澤婆心終是爲人忙一氣分形本自然圓明覺性合先天誰知一落風塵後萬劫千生墮業淵嗟爾羣靈夙障深頻將法雨濟沉淪從今悟徹原來性業鏡無形地界春道法經功師寶傳皈依信受頓超玄自然釋罪登仙籙九九功成化白蓮春宵漏永月華明露浸琉璃萬籟淸夜坐敲詩隨興起高山流水是知心探玄誰識這玄關一點陽精此内安日月任他旋轉去古今不破渾淪難參透黃庭無點奇此心默默有誰知天根月窟無人問滿地春光月影遲雲連此際到黔山只爲全書動我顏鶴駕不辭天路遠聊揮仙篆滿沙盤去年鄂渚一遨遊曾許門墻此地留襄贊近來成勝事玄風自爾耀千秋從來鶴馭不輕臨今日臨場爲閱經閱畢乘雲歸去也靑山綠水任流停涵三創制已多年今日鸞鑣發洞天百萬天兵隨我至世人那得識眞仙我亦無心題道歌偶爲予門識我多特把素心通一線玄功總是運黃河示野航道人名字緣何號野航漂漂無定水雲鄕主人牢把江心舵耐等仙家滋味長漫興神仙最愛是樓居閙裏尋閒總不如三五良宵應有待同心自可細爲書示人五首雲車闡法廣無邊難遇凡黎秉志堅今日仙鸞特授汝從兹演法度人天勤勤奉道莫遲違仙道精微達者稀總在一心淸淨妙佛仙儒也此同歸明明指點透玄關要識玄關可煉丹休謂乩沙容易得大千世界此中看煉鸞先要煉元神不煉元神仙不眞煉到仙凡合一處悟來身外別生身茫茫海宇煉乩沙誰信飛鸞與鳳車我欲通誠無識者反瞋仙客有浮誇示吳一恕滿目雲山何處好此囘須度白羊關但尋花木幽深地便是棲霞結大還長樂崶四首長樂崶下遇神仙朝星拜斗世外賢盛朝人傑地靈聚自有福夀永無邊見有仙翁住此山煉成靑髮與朱顏不貪塵世俗美器自知逸樂可延年偶來天竺躡雲樓曾見神仙在上頭徹底淸流照車馬吾亦蓬萊方丈遊重來又値仲春時幾樹松柏發新枝豈是人間塵俗處會仙須登步雲梯太上洞前偶題三首忽望靑霄起雲烟仙翁相對牡丹泉太上洞前長流水西向看經非人間籬戸金鎻尙未開天中日午照此岩相對淸談消永晝夜遊秉燭不想迴忽到伊闕山中遊更知洞天在上頭呼童放琴酌滿酒但逢神仙長爲儔贈龍門樵夫曾見對面一樵夫胸藏經綸胆氣粗長卧石岩人不識逍遙神仙世間無偶題萬里雲行上下連梅花一笑結奇緣誰知世有南華客打破妖魔卽是仙指玄三十二首世人宜假不宜眞難度長生上品經不免天機重漏洩靈丹只是氣和精道在人爲日用常逆修入口遍身香便須默養天胎就穩跨翔鸞謁玉皇西北東南在兩廂長房縮地在中央後人好學神仙法一樣丹砂補敗膓此法眞中妙更眞無頭無尾又無形杳㝠恍惚能相見便是超凡入聖人東華姓木老仙翁獨坐長房未有功忽遇西王金聖母靈丹一粒便騰空一法通時萬法通休分南北與西東朝朝只在君家舍要見須知撅土中黃鶴樓中次笛時白蘋紅蓼滿江湄衷情欲訴無人識只有淸風明月知法是先天一點氣將來煆煉作元神法官存想驅雷使煉此方得上玉京二八佳人體似酥腰間仗劍斬愚夫雖然不見人頭落暗裏教君骨髓枯曾讀仙經萬卷多篇篇只教運黃河此中有盞長生酒問道時人能吃麽朝遊北海暮蒼梧袖裏靑蛇膽氣粗三醉岳陽人不識朗吟飛過洞庭湖我命從來本自然果然由命不由天金丹一服身通聖可作蓬萊閬苑仙修仙不問男和女煉藥無拘富與貧一念不差皆可作我知不是世間人神仙歌訣洩天機方便慈悲指世迷見者莫生顚倒見大家都好學粧癡不死金丹種土砂諸人會得早離家一心只望長生路切莫如蜂苦戀花眞鉛大藥本無形只在人心暗與明男子懷胎十個月功圓行滿自通靈鼎爐安立守其心八兩朱砂八兩金和合天平兌定了便須仔細定浮沉奉眞含道守中和鐵杵成針要琢磨此事本然無大巧只爭日逐用工多一陽炁發用工夫日月精華照玉壺到此𦂳關休妄動恐防墮落洞庭湖曲江月現水澄淸沐浴須當定主賓若得水温身煖處便當牢固辦前程龍虎相逢上戰場霎時半刻定興亡諸君逢惡當行善若要爭强必損傷道本無言法本空强名指作虎和龍天然一物眞元始隱在𨶒浮同類中人言我道是虛浮我笑世人太没謀一粒金丹長命藥暗中失了不知愁龍虎金丹妙合天風雲際會洩甘泉白頭老子能知此反老還童夀萬年兩口相連似吕嵓諸人識得莫胡談離中力量人難敵能把乾坤一担擔降龍須要志如天伏虎心雄氣似烟癡蠢愚人能會得管教立地做神仙一樹梅花十月開預先帶得早春來木微尙且知時景人不囘頭只是呆方方遊化唱仙歌反被時人笑似魔不識眞金如糞土老龍把作毒蛇蹉昔年遊戲岳陽樓好箇鶯花鸚鵡洲今日重來沽美酒故人多半喪荒邱遨遊大地幾千秋勸化世人不肯修留此一篇眞奥妙飄然直上鳳麟洲苦勸人修不肯修卻將恩德反成仇如今囘首朝天去不管人間得自由浮名浮利事如風飄來飄去有何功諸人各自宜三省莫把仙方當脫空金剛經後三十二偈得手工夫切莫疑疑心若起便途迷行行直上山頭去柳媚花明遇自奇作善如登百尺竿下來容易上來難直須勤力行功過人獸幾希要細參迅速光陰不可留年年只見水東流不信試把靑菱照昔日朱顏今白頭萬轉身如不繫舟風翻浪湧便難收臨流執定篙和舵一路輕帆到岸頭萬法皆空莫浪求如來只在此心頭情枷愛鎻都抛卻無朿無拘得自由天堂快樂幾多般受苦諸魂出獄難苦樂由來爭一念靑蓮原植沸湯間恩愛牽纒解不開一朝身去不相偕於今撒手無沾滯直上靈山白玉臺富貴由來水上漚何須騎鶴上揚州蓮池有箇收心法靜裏常吟七筆勾花落花開又一年人生幾見月常圓打開名利無拴鎻烈火騰騰好種蓮心境從來要廓淸休教煩惱日相侵靈山無限逍遥處功德池邊洗六塵休教六賊日相攻色色形形總是空悟得本來無一物靈臺只在此心中心外求經路便差水中月影鏡中花眞空妙義君知否七寶莊嚴總欠佳風旛動處總非眞自在如如只此心解得拈花微笑意本來何地著纎塵流光迅速莫蹉跎名利牽纒似網羅撒手懸崖無別法白蓮臺畔禮彌陀經營世故日忙忙錯認迷途是故鄕識得本來眞面目此身原是臭皮囊元宵燈後便無燈萬古常明只此心朗照諸天終不滅一龕佛火月三更見美如無在一心莫將勾引怨摩登防閑女色如防賊外宼何能奪主人望鄕臺畔尙思家月慘風凉冥路斜總有紙錢無處使都緣一點念頭差森羅殿上鬼多般百沸油鐺萬刃山識得如來眞實義無邊解脫一時間䧟溺沉迷已有年愛河滚滚浪滔天持經自可登高岸何用中流更覓船塵緣斷後自消融淸淨方知色是空佛卽心兮心卽佛靑山只在白雲中聞說西方種異蓮花開十丈藕如船靈臺自有祇園樹本地風光卽佛天嬌姿原是粉骷髏暮樂朝歡總不愁一旦無常歸冥路夜臺難逞舊風流聚寶爲山未足奇不如持誦得菩提金剛明示成眞路何事亡羊泣道歧諸佛菩薩只此心何須泥塑與裝金世間點燭燒香者笑倒慈悲觀世音了悟猶如夜得燈無窗暗室忽開明此身不向經中度更向何方度此身去惡猶如解亂甯心自有得開時若教錯用些兒力萬劫牽纒没了期日夜無期只認眞畧差些子便相爭誰知一赴泉臺路悔把恩仇扺死分鐵面𨶒羅不狥情剉燒舂磨實難禁試從業鏡臺邊看地獄何曾見好人䧟入汙泥久不囘西江難洗垢形骸一朝得證菩提願鐵樹奇花處處開北邙山下列墳塋荒草迷離怪鳥鳴長卧泉臺人不醒桃殘李謝過淸明佛說波羅宻妙經前無千古後無今注成人鬼齊超度功德如天莫比倫襍詠七絕卽景言情偶成六十數南苕宛在畫圖中曡岫迴岑點綴工試拓疏窗閒騁望高低景色自空濛層樓縹緲欲摩空老鶴歸來寄此中何必結廬人境外翛然自不繫樊籠野含梅雨谷鸚衝曲水流珠鏡裏容坐看山光天外盡囘頭疑是劍爲峯浮雲半卷透天杠玉麈輕揮濯錦江把酒吟詩誰作侣山吞夜月影搖窗温泉獨有頗梨碑絶妙文詞幾世垂但見才人多賞識聲華内藴作箴規粼粼活水漾芳池生意盎然任所之弄荇偎萍魚自得烘堂怏睹躍鱗時灞水橋邊接紫薇花開靜待鵲南飛溪雲遠度淸池上物外應參造化機朱雀銜書到石渠浪花飛濕翠華裾鶯啼柳上驚人夢負局先生騎白驢沙中寶石伴驪珠羽袖揮來是五銖不畏蓬山相隔遠呼龍駕鶴上雲衢憑空賜下赤靈符巧扇留花雲漢圖杖几凝香消萬籟更聞鴝鵒勸提壺芝樓蘭閣夜分藜月上瑶階映浙西徧坐金鞍調白雪陳蕃下榻客星齊搜來典籍滿高齋適意行吟眼力佳自古奇書摩不盡別裁體格豁胸懷雪花妬舞惹官梅粉畫南峯獨占魁留硯成方偏誤曲披香學士到天台快把新書點筆裁當年自有鑑人才但將心地加磨鍊錦繡皆從墨沼開玉刻龍形占斗魁紫微宫裏雪花開壺中別定陰陽位醉坐梅間酌五罍提壺訪得倚樓人結綠珍奇宴席陳柳岸風和花信發蘋香已度棣華春問訊烟霞幾度春空江百尺躍紅鱗鶯啼暗識忘機客石面棠風惹玉人天葩宛轉吐奇芬海燕雙雙啄水芹絮語雕梁營舊壘銜泥製巧往來勤滿酌當年北海尊孤燈照耀月黃昏慈鳥反哺歸棲急綠水灣環靜閉門雲裏雙峯集鳳鸞銜圖應瑞託身安江邊暫坐聞漁唱水面鯨飛拂釣竿玉函龍氣出層山仙掌芙蓉未可攀星動瑶階光欲墜南林隱士不知還一泓深處碧涵天乍遇陽關洞裏仙下望山城皆海壖謝游橋上得雲箋嶺頭梅占小春先解愠薰風入舜絃玉屑箋題花筆字烟霞五色映芝田倚竹敲松對月眠樓頭倒影漾池邊座中香作蓮花帳咫尺雲山杖履前筞馬送君吹玉簫穹窿島嶼出雲標天開殿閣龍仙坐伐鼓中流破海潮千年古木鳳皇巢飲啄翩翩負九苞羽翮輝煌雲外舞蹔時遊憩泰來交枉賜金盤五色桃光華映帶在珠袍昔年曾過藍橋上石勢玲瓏集鳳曹羽衣空掛玉山阿葦暗汀洲蘸綠波束帶仙人松下坐抱琴彈劍和樵歌金粟欄邊五馬過龍樓問寢憶山阿淮王醉坐蘋風裏寶劍初彈起舜歌紫閣橫雲文錦多劉琨半睡夢薰歌酒酣揮灑生花筆最賞田塍九穗禾衝天寶劍卧龍沙打破眞泉透佛茶憑杖東風飛羽翥誰知點化是丹砂宫體何曾爲杏花靑蓮世界㪚香葩薰衣起作雙題錦巧借銀峯五色茶乍捲珠簾看百花姑蘇城外發奇葩淸風坐下仙人榻銀漢輕翻韻字紗洞裏寒泉潄碧沙尋芳偶遇玉人車手揮琥珀堪爲枕那得明珠獻物華廬山四友玉無瑕獨守中孚最可嘉只向剛柔深著力心源自得著光華滿苑花開五色光後園添得白龍香風來暗撲芬芳氣粉壁連環無盡藏鶴鳳騰飛入帝鄉劉郎夢會水仙王風泉林靜透蘭石城北猶留一字香獨上瑶臺過石梁荷鋤種玉氣蒼蒼消磨萬里星獨在留滯天涯醉不妨霜間紫帶發金英誰辨禽華勁節貞莫謂筵前無夀客碎黃飄㪚不知名半榻攤書照眼明碧窗簾靜竹風淸人來黃鶴樓頭宿醉倒金觴一夢成讀書擊劍兩三更坐對西窗聽鳳鳴鏡裏開花明月下靜聞玉篴和鸞聲笑擎雲液奏竽笙古跡留山顯七明駕鶴臨風飄海上琱文寶杖拄長庚賓館有花香滿城溪雲聚散傍山行水流東去聲何急麥浪初翻粉翅輕萬里雲中老鶴鳴賜衣傳節到江城香流古殿人如醉只愛蓂花奏太平金龍掌氣渚鴻驚夏簟生凉載酒行纔覺花酣蓮報謝海亭苔碧透𥑮聲玉漏初開空際鳴驚聞蕭寺度鐘聲知音便識心田事雅愛宫商韻轉淸春帶玲瓏結翠屏空山匹馬到雲汀初分活水鳴花澗也識仙鸞向玉庭曲終人靜數峯靑何處聲傳帝子靈兎入天中眉月裡雲穿江底白蘋汀蕙蘭采秀粉團馨駕鶴乘槎辨客星金掌臨冬調玉屑天涯何處是雲停歸到半山雲霧升欲從蘭櫂入崑陵天然瑶席誰來坐積翠浮空滿樹凝殘星幾點倚雲樓水墨煙林金鏡浮萬叠銀山蟬影碎風揺桂魄一天秋官柳三千繞蜀州金鱗玉馬遇龍輈雲山高士坐修竹醉折南枝作酒籌一撲淸風到樹頭枝枝盡是向南收欲知林影無消息翦翠分香任意搜空嗟石氏有黃金磨透生前一鏡心閒坐半空天語寂靜聞孤嶼奏羲琴凉烟一穗入簾深拄杖頻抽翡翠簪山鳥能言花欲語舊時書帙白頭吟石室深藏大寶箴奇峯重曡彩雲深悠悠白鶴眠松上留在西園寄好音步入池南折桂林蟾宫落子愜余心開軒賞酌來佳客檻外傳