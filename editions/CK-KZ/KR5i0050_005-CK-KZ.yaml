巾羽扇誰識天人蓬萊願應仙舉誰知會合仙賓遥望吹笙玉殿奏舞鸞裀風馭雲軿不㪚碧桃紫柰長新願逢一粒九霞光裏相繼朝眞戲作道情詞玄機無奥世人自認爲虛𣺌三五百千歸來多少說甚麽元皇氣巧總只是人情顚倒問而今眼底慧光胸中電影可曾知道西江有月東土有舟可能直泛蓬萊島黃龍有像白虎留形只都是强名之竅笑浮生碌碌朝朝枕黃粱未知驚覺任大夢無虧方能悟長生不老嗟嗟那時遲了今日箇叩囘道明日箇禮囘道呵呵令道人徒吐道人道我也不知誰箇能通曉今試以降筆臨壇信有無温良一服誰餐飽勸世塵須當一掃示津源樹影摇靑泉聲觸石中有野士頭蓬赤徜徉於無何有之鄕笑傲於夢幻影之世天高尺五道滿大千總不信誰非誰是樂烟雲未老而物我何逝更不假變態本因違太上之舊志看桃花還落漢唐春那丁郎鶴返餘得城百雉鴻雁唳空天千載人民莫識最羡取河上老人合金丹而醍醐且旨具雙眼視破其間自然終始道情曲以下曲步步嬌夢幻茫茫花開卸亂殺滄桑月休言今古賒試看一瞬乾坤千秋吳越若邪又何耶梅花冷淡人生業沉醉東風望咸陽殘霞剩闕惜商山流雲斷碣倩花神影漫遮線兒春拽錦屏忙鶴鸞頰餘紅褪也狂鶯那些任羽化南窗邀醉蝶好姐姐莫憐漁簑曉夜曾釣盡英雄興滅誰可以忘機鍊黃芽調白雪憑大塊生枝節我昻然自决月上海棠何饒舌秦謳趙舞生生孽惹花脂燕韻鳳雅龍奢惜夭桃紅雨輕盈况蜉蝣綠雲抛撇利名者似黃鳥春歌杜鵑暮血五供養黃金躍冶紫騰騰秀色箔我難些葫蘆倒控陰陽設雲姨月妹烟霞姐好伴我三皇舊客任人老韶光邁那些些君不見松濤驚起瓦棺蛇玉抱肚靑牛力怯怕函關夜度惟依洞月弄琴樽千壑酣雲坐嶺岩半林醉葉瓊姝欲遣鶴迎接柳烟休管人離别水紅花虛脾套子因誰設頓誤這流連豪傑總然寵辱三生結何堪卸四生週折不信羅浮舊恨何處芙蓉榭弔東山悲太液也囉雙聲子丈夫能自烈世事隨蛩咽玄機好對梅花說再休題玉簫有願同衾穴尾聲大鵬旣把扶摇接一任他鷦鷯暫借我且翦靑輪聊披寫漁樂曲步步嬌磯上羊裘誰爲傑自在桃花月輕舠任近賒趁著雲片風烟波帆葉蘭漿繫龍蛇蓼花何處蘆飛雪沈醉東風漢宫春笑他興滅隋堤柳催人離别瓊花也今在耶何曾開卸只落得東風週折漁竿影斜漁歌唱些然楚竹儘醉寒簑夜好姐姐追思人生事業千萬載無休無歇又誰知韶華瞬息間將伊撇只落得白楊月照荆棘斷碣月上海棠再休說桃源怕也成囂穴看洞迷猿嘯花落雲遮挽綸霓影摇摇捲波濤龍光疊疊休披寫鷗懶沙汀燕棲臺榭五供養幻哉夢也憶邯鄲最怯枕畔豪奢何時解脫羲皇蝶肯種幽蘭開綠野效彭蠡湖天放楫伴鹿鶴忘機矣運河車更好覓龍虎金烏作採接玉抱肚東山舊謝恨堂前燕去平常庭榭八公山鶴唳寒江九嶷竹鳳鳴春月誰憑法相了些些鰲鈎厯盡英雄鐵水紅花漁村遥與蓬接好甯貼參他黃白一聲欵乃各相協野歌兒深通道訣西岸咿呀暮影直把孤星射兩相呼堪停泊也囉示吕惠卿鼎裏坎離壺中天地滿懷風月一吸虛空塵寰裏何人識我開口問洪濛雲中三弄笛岳陽樓外天遠霞紅笑騎黃鶴暫過海陵東拂袖呵呵歸去鸞和玉佩風響喬松君若要知吾縱跡試問仙翁醉仙詞誰把銀河皆釀酒請月邀雲迷透一天星斗霧掩罘罳霞舒錦繡雪捲虛舟記漢陽秋樹醖葉綴丹邱散髮徜徉黃冠倒履花影盈頭吸百川而長鯨低首卧六合而鹿麀雙修風姨月姊笑我無知叟賣藥人歸多少杖頭錢問織女訪雲帘再沽他八斗任乾坤合璧日月轉丸酣眼矇矇杯斝休離手玉皇政務苦相催去否去否敲爻歌序敲爻歌者純陽吕帝君本大易而立言傳先聖之心法明性命雙修之至道也其曰爻者卽易之爻然非三百八十四爻一爻按一事之爻也乃一炁初判陰陽二物之眞所謂吾人性命之根蒂極萬象萬物總歸此爻蓋推極卦變二萬四千五百七十六之爻更至於窮無窮極無極不出於乾元用九坤元用六之二爻而二爻又只一爻也何也陰虛陽實陰以爲體陽以爲用耳所謂敲者卽相推之義然非按卦炁循卦變步長厯擬蓍策之推也藉曰有之得其理行其道爾而兼求其消長之信若有音息焉懼其行習之迷若必警析焉是又兼敲尋之義也夫大道玄微聖言昭著明明歌序而長言之矣孰敢僭爲一下贅語乎無奈吕帝之慈悲無窮後人之狂迷轉甚花酒之理未達陰陽之爻未知乃敢以御女邪說搬運旁門妄作註詮轉加流說誣謗大道得罪聖眞則不得不急有一註者莫如此歌矣但愚非能註之人竊於尋繹之際爲之訓詁以自盡厥心補曠日之過記參講之程耳因首論敲爻命名大義云蜀孕眞子書敲爻歌漢終唐國飄蓬客所以敲爻不可測縱橫順逆没遮欄靜則無爲動是色漢終唐國飄蓬客者祖師自謂也舊傳祖靈降於漢世因功修未竟至唐始成道或然也自漢逮唐經數百年自道視之一息爾或云祖受道於正陽帝君正陽漢時人故序道統淵源身接漢泒猶孟子述由孔子而來則祖系於正陽爲見知之聖當如是也飄蓬者無拘繫之意至人無已乘元化以出入如蓬隨風飄也敲推也爻者易中奇偶之稱太極所生之兩儀也易曰爻也者效天下之動者也蓋太極混沌之中一氣動盪而後兆形故動則必交交則生生不息以成變化得乎乾道爲男得乎坤道爲女乾奇則體剛而性健坤偶則體柔而性順本天親上本地親下天地定位天道下濟地道上行陰陽和通人生其中於是三極以立六位以成卦有大小方有正隅乾統三男坤統三女推盪而成易故易中三百八十四爻通神明之德類萬物之情無非只是乾坤初判之兩畫卽此兩畫論各判之體卽是乾坤論相交之用卽是坎離蓋乾坤得陰陽之全體坎離得乾坤之中炁故契謂乾坤坎離牝牡四卦以爲槖籥覆冒六十卦然何四卦之有只是虛無一氣初孕陰陽之至精爲生成運用爾所謂四象不離二體八卦互爲祖孫故不言卦象而但言爻也爻之推運經乎日辰緯以月紀通乎晝夜在造化之跡已不可測而所以敲之者則係天心眞宰以一而神旡名旡物無方無體尤不可測也此見全體心易身似飄蓬心握造化而不與凡流易識也縱橫順逆没遮欄者言爻也此一言盡包河洛先天方圓數圖在其中縱者經之如子午也以卦言之上下反對之綜體也橫者緯之如卯酉也以卦言之彼此變易之錯體也順者陽在陽中陰在陰中逆者陰在陽中陽在陰中也以卦體論則自外之内爲順自内之外爲逆又如否未濟爲順泰旣濟爲逆也以序卦全經觀之不過一縱一橫一順一逆而已没遮欄者周旋摩盪笮綜往來無不可也靜者爻之靜也動者爻之動也靜則幽濳淪匿渾涵於混沌虛無之中故無爲動則陽往陰來相交於天根月窟之際故是色色形色也亦兼交合之義是借用字法也此所謂常無常有也蓋無爲雖靜而非無主有爲雖動而非妄作也爻雖有縱橫順逆之變化而其樞要不過一動一靜邵子謂一動一靜天地之至妙一動一靜之間天地人之至妙至妙夫一動一靜之間非有不動不靜之地位也特動靜不失其時而遂不滯於動靜之物囫圇還一太極而己矣此一節全具道體雖未分别如何修性修命鼎爐藥物而人果能通其意者已畢盡無餘也也飲酒也食肉守定烟花斷淫慾行禪唱詠臙粉詞持戒酒肉常充腹此見不修小果不落斷常在塵出塵而獨行正道也酒肉藉以養體臙花業以斷淫雖唱詠宫詞無碍於如如不動之禪飽飫珍羞實力持不貪不殺之戒外則和光同塵而内則樂天安土自然忘物也色是藥酒是祿酒色之中無拘束只因花酒悟長生飲酒戴花神鬼哭此承上文而言見人生嗜慾莫大乎飲食男女今飲酒食肉而不遠臙花何以異於在夢凡夫乎不知塵境日用之中何常不有至妙之理特爭人迷悟之間爾如男女搆精萬物化生人但迷於愛慾之場而損生敗度豈知一陰一陽原必相資施化卽此可悟吾身眞陰眞陽相交相配而爲延生接命之藥故卽色悟藥吾卽以藥爲色吾所謂色非凡間情慾之色也蘖米之同類假醖釀而化酒世人躭之因以喪德失儀試思米味非酒一得淸泉感陽氣而遂生變化可悟吾人天生靈泉原爲我滋灌靈根之祿特須以氤氲造化耳卽酒悟祿吾卽以祿爲酒吾所謂酒非世人腐膓之物也是酒也是色也特患人不知躭之豈其中尙有拘束乎非此豈得肆耶夫好色如花好花卽色世人見卽鍾情奪目不知吾人陰陽之至精正有如花之不待染造自然炫爛鮮艷而隨陽春透露者吾只因世間凡花凡酒而得悟長生之秘妙遂日戴吾花日飲吾酒儘優閒暢樂而天地巳洩其秘藏鬼神難專其權柄而不能不哭也夫花陽體也火之精也而出於陰酒陰體也水之氣也而生於陽戴花於首飲酒於腹卽乾坤交泰坎離旣濟之口訣祖師明洩於此世鮮知之而反自生邪見殊可歎也不破戒不犯淫破戒眞如性卽沈犯淫喪失長生寶得者須由道力人此見性命雙修也承上文而言世人嗜酒敗德因以破戒破戒豈止於酒凡一切貪殺嫉妒陰私之類但生一念卽破戒也佛法五戒十儀而乃首及於酒者爲其亂性也豈獨佛門有戒凡道之法儀儒之禮律何一非束心檢行之戒而戒不可破世人躭色因以犯淫犯淫豈止於色凡一切聲色逸樂但佚於節卽犯淫也而淫不可犯蓋人有本來眞性原自圓明靈通包含眾物不染一塵如如不動如鏡懸空而性具人心心溺於情情識并競染著幻景破損律度一念肆起卽將至善本明沈入毒海而漸近禽獸吾人本具眞元命蒂精氣神寶生生不匱在此形身一爲犯淫九竅漏泄眞水潰奔眞陽隨散殞身喪命實由自殺欲得全此命寶性眞而不失者必須打滅情識時握慧劍一心以入道由道而生力外物不摇内守嚴密然後得也道力人眞散漢酒是良朋花是伴花街柳巷覓眞人眞人只在花街玩摘花戴飲瓊漿景裏無爲道自昌一任羣迷多笑怪仙花仙酒是仙鄕上文猶言撙節護守之法而因漸及其妙言保固性命者固在道力矣而此道力初非硜硜自守或枯老山林或理欲交戰强遏其心之爲道力人也所謂道力人者必有眞識大悟打破幻空自見本來自性廣大於是定慧並用頓入逍遥之境一腔春風隨在自樂無擇無捨而成一眞散漢矣此時心如木雞身似樗木藏大用於無用自然見物見心何物非心何心非道外境與内道無殊故酒可作朋花時作伴心旣何嘗染物亦何嘗遺物耶故花街柳巷塵市之境可以覓眞人而眞人者正於此地調心適性轉物隨機而玩此眞空也如此則眞性應物不迷矣而命功有作又須實修惟乘其陰中陽變摘花而戴陽中陰化飲我瓊漿密宻運用於塵境之中奪還我已失之元氣雖無爲而無不爲而道自日昌著而有餘也此時迷者不知反笑爲狂爲誕尤怪滋起然大夢成羣惟第任之彼豈知花非凡花酒非凡酒而我自有仙鄕耶到此鄕非常客姹女嬰兒生喜樂洞中常採四時花花花結就長生藥長生藥採花心花蘂層層艷麗春時人不達花中理一訣天機値萬金藥在採花此乃自然之實理非幻作之術試思羣花開放隱抱芳心而結實成種皆在於此故長生之藥全在採花之心而花蘂層層一團陽春之生意採此則春光在我矣物忽有花無幾而開放無幾而收歛無因而染彩此中原有至理全是天機不因師指無人識得欲得此一訣眞勝萬金嗟乎萬金豈能買不死哉曰心曰理曰機祖師步步說入秘妙讀者細參之庶不入存想幻法去也此以上皆言養性識藥之意謝天地感虛空得遇仙師是祖宗附耳低言玄妙旨提上蓬萊第一峯此祖師自述得傳於正陽帝君也天地虛空雖言神明而乾坤爲鼎爐虛空作神室眞鉛爲祖宗俱全在言表言師所受乃無上天仙之道故提身在蓬萊第一峯而功夫易簡道理幽深故語之至密極玄且妙也第一峯是仙物惟產金花生恍惚口口相傳不記文須得靈根堅髓骨欲學無上天仙之道惟有金丹而已金丹之道非頑空寂守陰靈之可比蓋其中有物也而所謂物者又非後天形質身中精液之屬乃是生身受氣之初從先天來天地一點靈根屬在吾人爲登仙作聖之眞種子是仙物也此仙物卽性命之根生死之竅雖然一竅郤有兩用合謂谷神分名玄牝此仙物在先天原屬乾金故能產金花而生於恍惚之際所謂藥者惟此而己故厯代聖師口口相傳其認金採花之法不記諸文字至秘也必須得此靈根然後血肉凡軀一經點化髓骨俱堅形完不壞矣正陽初謂祖師曰吾師記吾有口口者可授道今子姓名適符吾䜟遂授之則口口有由來也諸書遂因用之有言外意堅髓骨鍊靈根片片桃花洞裏春七七白虎雙雙養八八靑龍共一斤眞父母送元宫木母金公性本温十二宫中蟾魄現時時地魄降天魂欲堅髓骨必須得此靈根尤貴知鍊之而鍊之者須用火蓋火裏能生金花也以火鍊金則洞中不惟金花而桃花亦片片春矣桃色赤火也桃喻木性也是以性中之神爲火而以命蒂金花爲藥也何也金公本是乾家子乾居甲爲木性性中神屬火金寄產於西鄰爲情情生精爲水是金木本同生而異居由東家而去者還須以東家之物往求之道也然而藥火何分之有惟陰與陽必須雙同惟性與情自然兩合卽此東木西金分之卽列爲龍虎性與神一家性在神中龍從火裏出也情與精一體金生水内虎向水中生也四象只成二體一龍一虎一浮一沈本天親上本地親下卽是乾坤兩爻卽是吾生身來之眞父母而白虎爲陰陰中根陽故用少陽之數七極其數爲七七靑龍爲陽陽中根陰故用少陰之數八通其變爲八八易中七七著之數圓神象天八八卦之德方知法地今合龍虎雙用卽是兩弦二八一斤全體之易數也雙雙養總一斤爲互辭者蓋體之實一龍虎而用之則龍就於虎虎就於龍出一雙雙入一雙雙又旨中玄妙也此二物一合卽復本來性命無分之體故送在元宫元宫中宫混沌之地也金木二情本相慕戀一見則温温相守而無偏陰偏陽之性矣從此進退出入於十二辰中金蟾現魄如月月有合卽時時以地魄降攝天魂而日日有合也地魄卽虎天魂卽龍前言以火鍊金是龍制虎也此言以魄降魂是虎伏龍也龍虎本互相制伏而顚倒巧用之天機如此然龍無而虎有龍浮而虎沈終須以地魄爲主焉此掘地尋天之旨也鉛初就汞初生玉爐金鼎未經烹一夫一婦同天地一男一女合乾坤庚要生甲要生生甲生庚道始萌拔取天根並地髓白雪黃芽自長成鉛亦生汞亦生生鉛生汞一處烹烹鍊不是精和液天地乾坤日月精此一節指淸鼎爐藥物見金木本相隔而須相見鈆汞本同爐而必互烹明鍊藥之事也龍虎旣雙養則鉛汞生矣鉛汞者龍虎之弦氣也龍虎卽陰陽之體而謂乾坤鉛汞卽龍虎相交之用而謂坎離乾坤鼎爐也坎離藥物也爐坤而謂玉爐者以虎中藏至陽之氣鼎乾而曰金鼎者以龍中抱至陰之精也鉛卽金花也金在水中以象坎也汞卽神水也木居火裏以象離也上言眞父母送入元宫則龍虎會而鉛汞生矣父母卽乾坤則玉爐金鼎立矣然是初立匡廓藥之一點根基未經時烹刻鍊如何能生變化也若鍊丹旣識藥材便安爐鼎隨須烹鍊從此始芽蘖分胎變質以至成就中間層層生化未易一言盡也夫始初一龍一虎本象夫婦而同天地之配合矣而繼此之後夫婦復生男女男女復合乾坤仍爲夫婦如乾生三男坤生三女皆相配合層層變化皆是一付鼎爐而用烏有盡乎始初一合未嘗不由於兩至於兩旣合一一復生兩從此變化生焉而庚甲生矣庚者一陽初生於坤地藥之虧而轉盈也卽虎啖龍精也而庚要生甲者三陽長滿於乾家藥之盈而欲虧也卽龍吞虎氣也而甲要生必生庚生甲然後天根月窟互相往來而道始萌動生生不息矣庚虎甲龍卽金木也金木本然間隔浮沈不一其性今郤以一氣烹鍊而反取天根於虎尾抉地髓於龍頭則從此藥漸盈聚而陽中之陰如白雪而降陰中之陽如黃芽而生藥日長成不但如初花之飄忽矣庚甲旣生卽是汞鉛蓋汞鉛雖是二體而實同宫鉛爲金金在水中母隱子胎汞爲水水在金中子藏母胞故鉛亦生者永亦生也鉛汞同生一處而金水相滋亦互相擒伏烹鍊無有已也如此則所謂烹鍊者豈血肉軀中精與液之陰物哉乃巧奪天工侔合造化而鍊取天地乾坤日月之精華也黃婆匹配得團圓時刻無差口付傳八卦三元全藉汞五行四象豈離鉛鉛生汞汞生鉛奪得乾坤造化權杳杳冥冥生惚恍恍恍惚惚結成團此見調和鉛汞之全在中土也黃中色婆老女之稱謂中宮土意也龍虎分兩畔調和之者全在眞意照顧隄防然後匹配夫妻而得團圓黃婆以人用之謂之眞意以藥言之實玄關中天符眞信故有時刻蓋眞信之一翕一闢卽眞意之一動一靜而藥之老嫩浮沈皆於此中别之火之進退抽添皆於此中運之差之豪厘鉛飛汞走矣故必黃婆口傳兩家之信時刻無差然後無誤也鉛汞者坎離之精周流六虛變化無常乾坤造化萬物無過此二者升降運用則三元八卦四象五行種種異名殊體總約於此此卽萬物眞性眞命得此則掃盡萬象豈不易簡乎全借汞豈離鉛互文也一陰一陽之謂道而分陰分陽迭用柔剛故以鉛生汞而汞復生鉛在鼎則坎離水火之互根在天則日月交光而相易豈不奪盡乾坤造化之權耶造化旣在手中全聽中宫之符信而於以見陰符之至也杳杳冥冥而覓眞精陽信之來也恍恍惚惚而尋有物眞意默默如常鉛汞凝結日長杳杳冥冥生恍惚而恍恍惚惚遂己結成團矣曰成團較黃芽白雪又著矣性須空意要專莫遣猿猴取次攀花露初開切忌觸鎻居土釜勿抽添此言養火隄防之功也學道之人未曾採藥先須養性故忘物無心終作閒㪚之客而鍊藥之際尢貴隄防恐一時中變火候全非蓋性護命基一毫不容决裂故性須全空本來常寂一無𦊱碍然非一任無事也而意郤要專勿助勿忘莫教心猿跳弄不時攀引致神出火㪚緣大藥初形之際一點陽精如花上露難留易㪚切忌觸動一念驚擾藥失成凶矣此時默默囘光纔得到手卽一意守在中宫勿緩勿燥採藥機關在此矣養火功夫在此矣沐浴隄防俱在此矣蓋意散則火寒意躁則火廹全在素日鍊巳持心純熟而後無失也玉爐中文火爍十二時中惟守一此時黃道會陰陽三性元宫無漏泄氣若行眞火鍊莫使玄珠離寶殿加添火候切防危初九濳龍不可鍊此言抽添火候法則也修丹法則全在取法天地出陽入陰開閉生物之功天地一年有冬夏一月有朔望一日有昏曉陽氣逐漸而添則陰氣抽陽氣逐漸而抽則陰氣添雖有抽添之漸其實只闔闢之理陳之爲卦爻約之爲斤兩皆此義也鍊藥雖非按厯布卦以行而一不可違其度然藥與火又各有所象藥乃金水之精全在月節而辨朔望火有文武之用全在日辰而知昏曉以火鍊藥外火内符貴相應也蓋藥在鼎中乍沈乍浮沈則水歛金淪隱於太虛而象朔浮則金旺水舒超出太淵而象望而火之添也象自子至己之曉而陽火之抽也象自午至亥之昏而陰己故當鎻居土釜之際而玉爐中但以文火温爍之十二時中惟當恬淡無思綿綿若存守冲素眞一之氣蓋此時藥方斂情火宜種種如晦朔之間太陰與太陽正會於黃道而金木土三性者俱返於受胎之元混沌虛無之宫而不可使漏泄於外也若使陽氣一到剛健流行白虎舒情發情暢發此時便宜進火一意媒合眞火煆鍊仍當牢閉八門勿使玄珠衝佚而離於寶殿寶殿者喻如王者布政萬國來朝鼎中玄珠旣成萬神齊應不可亂越也火候愈加藥性愈健但此加添之際切須防危要知守雌之意鉛汞見火易於飛走故耳若前此則濳龍勿用之時斷宜抽火勿輕助長此祖師末後丁甯語也消息火刀圭變大地黃芽都長遍五行數内一陽生二十四氣排珠宴火數足藥方成便有龍吟虎嘯聲三鉛只得一鉛就金果仙芽未現形文火温養象天地之一消也眞火煆鍊象天地之一息也火旣消息相噓藥遂生成變化故始之得者不過如刀圭之微至此遂變矣黃中通理美暢四支土釜金盈如大地長遍黃芽充實光輝何盛也然此一消息中卽備四時五行之數而發火微温必在一陽初生之子乘時進火頃刻一周而備二十四氣但此時節候愈明藥生曡曡不窮如排珠宴之麗其娛目充腹可知矣藥重一斤分之爲三百八十四銖火必周卦晰之爲三百八十四爻火數旣足藥乃方成則龍虎成形每一際會便有吟嘯之聲色象聲音全著不確然有物乎然鍊大丹之功正不止此蓋一氣判而爲三元鍊鉛以之此乃陰丹初成始立地極是藥有三鉛而始就其一則金果仙芽猶藏地下未得脫質現形只名藥就未可稱丹蓋内之造化如此再安爐重立鼎跨虎乘龍離凡境日精纔現月華凝二八相交在壬丙龍汞結虎鉛成咫尺蓬萊只一程乾鉛坤汞金丹祖龍鉛虎汞最通靈通此理道方成三萬神龍護水晶守時定日明符刻專心惟在意䖍誠黑鉛過採淸眞一陣交鋒定太平三車搬運珍珠寶送歸寶藏自通靈天神祐地祇迎混合乾坤日月精言内藥旣成便當移爐換鼎再安重立尋求天上之寶也於是姹女乘龍嬰兒跨虎而離於凡境超出淸空之上產在坤者安得不種在乾乎日精纔現月華凝者言陰丹旣成陽丹纔下手也卽無根樹詞月裏栽培片晌時採取先天第一枝也二八兩弦水火其理俱同相交在壬丙壬丙水火之陽者也蓋前此龍汞旣結虎鉛旣成原去蓬萊不遠然尙隔一程弱水三千猶在此岸正當急求先天靈父聖母之氣乃乾天之鉛坤地之汞而爲登天藥祖然先天一氣本自外來非身所有如何得他歸附鼎中不知我之龍鉛虎汞原本同類本是子母特有先後天之殊耳其實子母相親惟他最能通靈以此求彼如陽燧取火方諸取水惡有不得者乎必須洞達此理道方能成而以三萬神龍護定水晶神龍離中之龍火也水晶坎中之金藥也三萬者三萬刻功夫也三萬刻火功無一毫爽失卽是三萬神龍護定水晶鍊已待時以俟先天符信之至此時毫念起便喪天眞故曰守時定日明符刻專心惟在意䖍誠也蓋鍊取地寶猶如池中鍊鉛今黑鉛已過化爲金母以作神室便當專精節候採取淸眞靈汞淸眞元始祖炁至淸至眞也只須一陣交鋒永定一體太平眞元出而萬化安矣定不摇也先天母炁擒住子氣如貍守鼠何處奔逸然至此時方云則先天一刻未得一刻何得太平乎惟時以三車收貯連我素積之珍珠寶合併一路送歸寶藏自然萬神嘉讚百體通靈矣三車大小河車紫河車也寶藏者乾家交感宫也契所謂搗治併合之持入赤色門者是也但見天地神祗上下感應混合乾坤日月精化成一氣而無天地乾坤之可分矣前曰烹鍊此曰混合祖師處處喚醒此會合大藥之口訣也虎嘯一聲龍出窟鸞飛鳳舞出金城硃砂配水銀停一泒紅霞列太淸鉛池迸出金光現汞火流珠入帝京以下二節復就前之口訣而詳言之前此鍊藥乃龍居虎位以龍覓虎此時鍊丹乃虎據龍宫以虎召龍故虎嘯一聲龍隨出窟契謂白虎唱導前兮蒼龍和於後是也龍虎出窟化成猛火鸞鳳南方朱雀之象契所謂朱雀翺翔戲是也飛出金城而升閬苑金城黃庭鍊藥之城廓也此時藥已脫胎硃砂水銀相停配合其壬丙之二八所謂金砂流爲汞金液成還丹但見一片紅霞列於太淸之際渾然無我矣以龍虎言之如此以鉛汞言之大丹之用莫大乎金火鉛爲金而金以火而流光從池中迸出汞爲火火因金而聚而成珠流入帝京金化火火化金金火又無辨矣帝京太淸皆言乾宫也其實鉛汞龍虎初非兩事藉物喻道異名而已龍虎媾外持盈走聖飛靈在寶瓶一時辰内金丹就上朝金闕紫雲生仙桃熟摘取餌萬化來朝天地喜齋戒等候一陽生便進周天參同理祖師爲丹之得失只在片時恐人失手故復叮嚀之言當其先天初自外來與内藥交結只在一刻之際最宜仔細此時龍虎眞媾學人外要如持盈滿身心俱死巍巍不動葢乾之飛龍坤之牝馬善飛善走之靈聖俱在我寶瓶之中一毫妄動便喪失矣只等一箇時辰金丹便就便脫質飛霞上朝金闕而得大命到手矣若到此地位仙桃已熟只須摘餌萬化生身百神朝贊重開天地之喜其喜何極以後只須心齋集虛只等一陽之生便行周天之火温養結胎而作人鉛之事始明金碧參同之理也仙桃卽金丹也前曰金果此曰仙桃有金花遂有金果有桃花遂有桃實祖師善喻如此宜細參之則其中同異淺深自悟自再安重立至此皆言結就天鉛是爲陽丹造化在外者也參同理鍊金丹水火薰蒸透百關養胎十月神丹結男子懷胎豈等閒所謂參同周天之理者葢爲鍊此金丹也藥得火成丹金丹又須火鍊人始可仙丹初得來一身金液氣血翕然趨附從此又當調文協武行十月温養之火使水火薰蒸百關俱透鍊形成神而後形神俱得大妙神丹旣結嬰兒在抱而我相成矣始之地藥天鉛如夫婦交感而受孕而今火養十月則藉母滋育而始成人也男子懷胎乃在三盗宜時三才安後而始得豈是等閒也耶周天之火法不異前然此時本自不勞但安神息一任天然而造化自然無差無庸重講參同卦象内丹成外丹就内外相接和諧偶結成一塊紫金丸變化飛騰天地久丹入腹非尋常陰形剝盡化純陽飛昇羽化三淸客名遂功成達上蒼此言丹道圓成嬰兒胎脫也總上文而言一鉛初就則内丹成矣仙桃摘餌則外丹就矣周天温養則内外相接和諧偶矣由是火候旣足打成一片結成一塊紫金之丸赫然不磨變化飛騰與天地并久也蓋天地之所以爲天地者以大道主宰流行故得不壞丹卽道也今旣圓成豈不并與參乎且丹一入腹非比尋常蒸若雲霧疾若風雨將一身陰濁之形盡剝化而換爲純陽之氣自然金筋玉骨輕若飈塵嬰兒脫體元神出現可以飛昇可以鶴化而爲三淸之客此乃大丈夫功成名遂之時也姓名可達上蒼而注仙藉矣三淸客駕璚轝跨鳳騰霄入太虛似此逍遥多快樂遨遊三界最淸奇此言陽神出入也丹道旣成嬰兒壯健陽神所到可以展臂千里或駕瓊車或乘鸞鳳飛空走霧任三界之中皆可逍遥快樂其轝與鳳實皆道氣所化不比質物而丹書有以漸調神之法又在其中也太虛之上修眞士朗朗圓成一物無一物無惟顯道五方透出眞人貌仙童仙女彩雲迎五明宫内傳眞誥此言鍊神返虛也初生天地以來無極而太極復還原本以後太極本無極丹成之後畢竟還空而親作佛乘上上事故言太虛之上猶有修士論大道無盡修亦無盡理固其然而此實修性覺眞空圓通八面猶在人間非果必於虛空之上修持也故朗朗圓成一物俱無而因應無方隨緣顯道眞性齊同塵塵葉葉無非法身故曰五方透出眞人貌非必作神通變化也而神通變化亦正無窮無盡爾三千八百之功行完畢仙仗來迎受敇膺符而拜眞誥於五明宫中五明宫者上帝之宫也傳眞誥話幽情只是眞鉛鍊汞精聲聞緣覺氷消㪚外道修羅縮項驚點枯骨立成形信道天梯似掌平九祖先靈得超脫誰羡䌓華富與榮登仙作佛道極幽玄究其眞實只是鍊鉛求汞至易至簡至眞至妙而非修聲聞緣覺小成之果者所得思議宜聞之當驚懼退縮矣蓋此金丹一粒能點枯骨囘生而大道坦夷并無邪險誰道天梯無路乎且成道之後九祖先靈俱藉超拔而人乃羡人間之富貴反自不爲嗚呼富貴何足羡也耶尋烈士覓賢才同安爐鼎化凡胎若是慳才並惜寶千萬神仙不肯來大道源流不欲中斷故欲尋賢烈以傳繼仙宗而乃世人鄙吝爲心只知恃才積金焉能超出凡俗此所以神仙遠去也慕道希仙者亦戒此而可哉修眞士不妄說妄說一句天公折萬劫塵沙道不成七竅眼精皆迸血貧窮子發誓切待把凡流盡提接同赴蓬萊仙會中凡境熬煎無了歇此祖師度人心切無奈迷人不信而自誓以証其言之不誑也因代人憂之曰塵境熬煎何時了歇乎讀此令人下淚矣塵世短更思量洞裏乾坤日月長堅志苦心三二載百千萬劫夀無疆達聖道顯眞常虎兕刀兵更不傷水火蛟龍無損害拍手天宫笑一場言塵世景短丹道味長堅苦之日無多逍遥之時靡盡聖道命宗也眞常佛性也性命雙修而遠離人世諸患證位天階顧不樂耶這些功眞奇妙分付與人誰肯要愚徒死戀色和財所以神仙不肯召眞至道不擇人豈論高低富與貧且饒帝子與王孫須去繁華挫銳紛瞋不除態不改墮入輪迴生死海堆金積玉滿山川神仙冷笑應不睬名非貴道極尊聖聖賢賢顯子孫腰金跨玉騎驕馬瞥見如同隙裏塵隙裏塵石中火何在留心爲久計苦苦煎熬喚不囘奪利爭名如鼎沸如鼎沸永沈淪失道迷眞業所根有人平郤心頭棘便把天機說與君祖師勸之誡之怨之又復誘之怒之又復教之覼縷之情無己總欲人勘破財色一關除郤高下貧賤驕矜謟諛俗見以修大道其視人皆赤子也人何不思命要傳性要悟入聖超凡由汝做三淸路上少人行畜類門前爭入去命道密妙必要眞傳何不速於尋師性體圓通貴乎實悟何不實在體察甘趨苦海返遠眞途可怪也己報賢良休慕顧性命機關堪守護若還缺一不芳菲執著波查應失路只修性不修命此是修行第一病只修祖性不修丹萬劫陰靈難入聖達命宗迷祖性恰似鑑容無寶鏡夀同天地一愚夫權握家財無主柄此再復丁甯性命雙修以爲修丹者法則也性命之機如影與形性命之理如根與花性不明則頑命不立則㪚頑與㪚又入塵劫矣爲報學道賢良必當以命守性以性護命而洞識其機關若或缺一無根少神焉得芳菲而士之有志者亦有往往鮮成非道之負人也或執著而不求詳通或波查而築室道旁不達眞機自迷理逕又焉能成乎且修性而不修命終屬陰靈修命而不修性終殢幻形爲道一狥於偏性命兩失其眞縱有一成尙落偏枯而况無成者哉可以永爲修道者則矣性命雙修玄又玄海底洪波駕法船生擒活捉蛟龍首始知匠手不虛傳此自述作歌傳法意也歌中所述乃無上聖眞玄玄之道爲人作駕海之慈航果有上士利根言下識訣能明能行則如擒蛟龍之妙手應心獲效始信道不虛傳而爲聖人之徒矣龍出海藏有乾陽之氣出於坎中之象蛟含交合之義雖係罕譬而亦末後微言爲之印眞者也谷神歌我有一腹空谷虛七字當作三讀我有一讀腹空讀谷虛讀一者道之宗玄之奧也此外無他故曰一此中無所不包故曰腹空腹空如谷虛七字一句内谷神之義已盡言之道有又還無言之無兮不可舍言之有兮不可居谷兮谷兮太玄妙神兮神兮眞大道保之守之不死名修之鍊之仙人號非有非無卽無卽有言無不捨言有不居谷神之玄微入藥之門戸也神得一以靈谷得一以盈若人能守一只此是長生長生本不遠離身還不見鍊之功若純自然凡骨變守一卽是谷神谷神不死玄牝門出入綿綿道若存修鍊還須夜半子河車搬載上崑崙夜半子非是亥後丑前時分乃天地未分前無極眞機此卽是一外此卽非一矣超越凡界如上崑崙也龍又吟虎又嘯風雲際會黃婆呌火中姹女正含嬌囘觀水底嬰兒俏嬰兒姹女見黃婆兒女相逢相意合龍虎嬰姹本非異體譬如中室懸一明燈四壁普照東照曰嬰西照曰姹南北龍虎義亦如然時人眼識只逐壁光不解囘頭自認燈火坐是紛馳千差萬别勞擾不已若了此者卽見黃婆姹女爲嬰兒故含嬌嬰兒爲姹女故賣俏嬰姹相逢卽是黃婆現處亦非有異物也金殿玉堂門十二金公木母正來過金殿玉堂黃婆之正位金公木母嬰姹之本家亦非有異境也重門過後牢關鎻點檢斗牛先下火進火消陰始一陽千𡻕仙桃初結果斗牛先卽夜半子此四句是功夫小結束坎離相交一度結成黍珠一粒也成珠結果皆是强名不過言這一段功夫有個成就歸宿之意曲江東岸金烏飛西岸淸光玉兎輝烏兎走歸峯頂上爐中姹女脫靑衣此四句是工夫大結束日精月華悉是芻狗灰飛烟滅虛空粉粹方露全身紫陽云一粒復一粒從微而至著上四句言微此四句言著也脫郤靑衣露素體嬰兒領入重幃裏十月情濃產一男說道長生永不死此四句是功夫休歇處亦是功夫不休歇處到此地位純淸絶點謂之純陽一切把持存想俱用不著豈非休歇處耶與天同運與地同貞日月四時合明合序豈非不休歇處耶不休歇處大休歇是謂無生永不死十月產男句是譬喻人道生人人所易曉翠虛云彼之以情而感情尙且嬰兒十月成是也希夷醉眠千日達摩面壁九年有甚期限勸君鍊勸君修谷神不死此中求此中悟取玄微處與君白日登瀛洲與許也此係白日飛昇之大道萬古玄源斯爲極則卽彼得金丹鍊成陽神果滿超脫者視此尙有死活毫釐之辨何况未得大成者耶聞南五祖惟白眞人北七祖惟孫眞人妙得此傳古仙之高於近世成眞者其分别處在是也百字碑養氣忘言守神仙以精氣神爲三寶而秘密處則專以養氣爲主氣聚則生氣㪚則死氣長則生氣短則死氣緩則生氣促則死此氣難居易㪚六慾七情刻刻消耗非虛極靜篤必不能守守者守之使不散也守則内不出外不入還歸胎中一息則氤氲變化關節自透所爲氣歸元海夀無窮神仙謂氣是添年藥道人無别事養炁是功夫坐忘銘曰常默元氣不傷多言損氣故貴忘言忘言乃養氣之妙訣也降心爲不爲大道教人先止念念頭不住也徒然止念者降心也心如生龍活虎最難降伏萬緣放下死心塌地爲而不爲終日睹終日不睹終日聞終日不聞行乎千軍萬馬之場如入無人之境孟子之不動心曾子之守約皆得力於此愚聞之師曰不如槁木死灰不可眞如槁木死灰又不可心死則神活金剛經曰應無所住而生其心動靜知宗祖功夫不離動靜二境動者氣也氣欲其暢靜者神也神欲其凝至靜之極神凝而氣自和靜極而噓如春沼魚動極而翕如百蟲蟄神炁渾合俱在性根命蒂上討分曉老子曰玄牝之門是爲天地根呼爲玄上接天根吸爲牝下接地根元炁所由生眞息所由起乃凝結聖胎之地所謂生身受氣初也譚眞人曰得灝氣之門所以歸其根知元神之囊所以韜其光經云性在泥丸命在臍天魂地魄坎交離命蒂由來在眞息多少修行人不知無事更尋誰人生那一刻無事掃除萬緣胸中不留一事如明鏡無塵止水不波自然元氣不散靈光自現不必更尋長生門路矣然無事甚難入山欲深入林欲密舊緣漸斷新緣莫結大事化小事小事化無事無事不生事有事如無事庶幾近之矣眞常須應物眞對妄言去妄則全眞常者厯萬劫而不壞便去應物亦何妨須字甚妙不試烈火怎識眞金所謂對境不動難悟眞之士若勤修煉何妨在市居朝應物要不迷世間之物總是空花泡影若一貪戀心必亂動元氣耗㪚皆因染著應物不迷居塵出塵在慾無慾馬眞人云時人欲覓長生藥對境無心是大還種種荆棘須以慧劍斬之一靈燭炳羣魔自然郤走不迷性自住自古神仙跳不過澄湛二字塵多則水濁心多則性昏能澄心省事應物不迷則淸明在躬志氣如神如秋月寒潭誰能點染人有智愚性有巧拙大智若愚大巧若拙可以伏藏住者亦陰符經伏藏之義也性住氣自囘世人只因神明無主一任此氣奔潰四溢關鎻不住先天一炁如明窗塵太素烟片片浮動最易飛去最難結聚性住則神凝此氣漸囘漸生囘者還返丹田所謂神入氣中氣歸元海太陽移照月明宫也氣囘丹自結神仙無别訣只要凝神入氣穴氣穴卽丹田也眞氣凝聚於此宜常伏氣於中神氣相合先天一炁不㪚卽是内丹時節若至不知所以然而然故曰息息歸根金丹之母壺中配坎離壺中指心田言參同契云狀如蓬壺坎屬水潤下離屬火炎上誰無心腎水火不相見心腎不交則坎離不配配者心火下降腎水上升古訣云起水中之火以鍊鼎中之藥一呼一吸相吞相嚥打成一片如夫婦之匹配然陰陽生返復心汞炎上易飛所謂太陽流珠常欲去人必須升水中之鉛以制伏其飛性所謂得金華轉而相因也取坎中一陽補離中之虛是謂顚倒陰陽生返復槖籥歌曰天上日頭地下轉海底嬋娟天上飛人心若與天心合顚倒陰陽只片時普化一身雷此言陽氣震發之象三岔口氣足機動籟鳴聲如雷震所謂撥開頂門關捩子須臾海嶠起雲雷乃陰陽升降自然返復之象康節邵子云忽然夜半一聲雷萬戸千門次第開若識無中含有象許君親見伏羲來白雲朝頂上白雲喻身中元氣坎中一點眞陽之氣滃聚如雲上冲泥丸是謂水騰浮作離中汞翠虛翁云靑龍把鏡照泥丸五色祥雲在上關神仙妙訣只要眞氣熏蒸黃庭經云九炁暎明出霄間又云紫烟上下三素雲興雲致雨山澤之氣相通此義殊不淺甘露灑須彌天地布氤氲之氣甘露自降眞氣旣足靈液自頂而下澆灌一身猶如天地之甘露灑自須彌遍四天下無不沾濡悟眞篇云甘露降時天地合黃庭經云王池淸水灌靈根經謂火從臍下發水向頂中生此水得天地正陽之氣飲之可以長生自飲長生酒長生酒卽甘露也古歌云長生酒一壺東君不用沽太倉粟米瑶池做銀河倒轉玉漿流遍乾坤滴滴如甘露下重樓飲上數甌逍遥誰得知坐聽無弦曲明通造化機都來二十句端的上天梯鍊石補云無上妙法不外一知卽得然惟身在逍遥之境乃心合得知之妙曰無弦曲曰造化機非言語所能詮而至坐聽則天耳通至明通則天眼濶此二十句共百字皆恰符金丹之秘都來二字更明明金針盡度非章句人所能曉上天眞眞有梯特患人尋不著端的耳此篇一字一牟尼寶珠將天仙正傳飛昇大道活活現出人誠能仰體吕帝普度慈心廣行善事積行累功由圓滿通明以至飛騰變化一切妙訣盡在末四語中讀者勿僅依文解義便謂會得了也如是知如是見如是信解通首作如是觀法語丹訣示智覺二首崇一卜雲從註動機在有意無意之間運行於若存若亡之際此吾師直指人下手第一著功夫無機無相此之謂也從下丹田提起至崑崙頂放下此是取藥法下丹田在陽關上先天一點埋藏於此要看一陽發動處許多春氣透根荄此卽是藥物藥物謂何精氣神耳築基立已全在乎是白虎水中跳浪靑龍火裏翻雲龍降虎伏萬物歸根其時鬼神覬覦學人宜愼宫中綘幘眞人坐海外黃冠道士歸此是接命時還精補腦惟慮走洩東南子午各爲谷西北乾坤别有天此是顚倒法混合上下無一粘染純乎樂境矣龎眉婆子嘻嘻笑姹女嬰兒成一家此是歸鼎立爐法此後則子午功是火候若無黍米金丹藥難跳竿子百丈頭此是身外有身跳脫一切時非有前輩藥物必多紏纒予向曾以之贈人多遭謗詬舉世聾盲可慨也夫本來面目無奇處碧眼胡僧仰望雲此是遊行八極時苟無扶掖必多顚撲湧泉本是生人海不識休教别地尋此是錯走一線卽成歧路道貴眞傳故又叮嚀如此一拳打破圓圈子粉碎虛空一物無此是得一畢萬形神俱妙無無亦無拍掌大笑純陽崇一各作數語金丹大道了無遺著二三子猶在邯鄲夢境中睡魔難驅如此何怪丹臺人少陀羅尊者識又莫嫌閙裏無消息靜處功夫動處參此是築基鍊已工夫吾師直爲指出學者宜詳味之運行上下無停止直到源頭見落花此是推源法又是運行法一日一週天源頭無朕跡一點原從天上落漫教海底久埋藏此是採取法得一守一萬事畢得之守之不可思議夫妻團聚靑龍伏兒女嬉遊白虎降此是會合法夫妻龍虎假立名色耳問之吾身了無一物太陽纔出東洋海直照西牛古賀洲此是以彼用此法萬慮空時四大無有風動旛耶旛動風耶學者試下一轉語未能色相空諸有到底來囘不自由此是得魚忘筌法不忘便滯滯便不是然而要忘又忘不得須向頂門一針此時眞正長生藥然行之不難人多自餒元崇一道人卜雲從又識吕帝詩集後跋孚佑帝君詩載入全唐詩者不數首其餘諸刻本及鸞訓所傳外間多不能備兹重訂全書裒而輯之編列成集較别本增十之五六搜擇融洽與道大適所以仰承帝君度濟無量之恩心版相應固不憚疲於津梁矣志通幸侍覺壇日聞緒論未能稍窺萬一然昕夕披吟隨所見之淺深測斯道之義藴兢兢焉弗敢釋每念篆烟徐裊心息俱恬朗月在空虛白生室於詩中之旨口誦而心維可也得言而忘象亦可也九轉大還鼎爐具是特恐鈍根人自泥丹竈非鑿則歧耳太上不云乎道可道非常道名可名非常名知此解者庶幾旦暮遇之志通弟子程國仁謹跋
