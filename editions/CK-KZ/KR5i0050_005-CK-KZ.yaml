到白蘋冬至厯元千載溯黃鐘卻喜今朝子半逢測測琯灰飛動處陽和一點逗春風咏雪細碾瓊瑶遍地堆一腔眞白結成胎自憐縞素無香味催取梅花作伴開咏竹二首竹梢風動影叅差暫屈垂頭强自持寂處漫憐存苦節自將靑翠鬥芳姿一株秀竹樹庭中四季青青不改容縱有狂風吹不斷玉淸殿裏伴仙翁覺世十首滿架薔薇滿院香遊蜂日日逐春忙笑他一世空勞碌幾許甜頭得自嘗星移斗轉月西斜乘醉行來興自賖不道癡人還未覺營營名利最堪嗟遊子歸來秋正芳小園香滿桂枝黃而今識破秋雲薄莫學莊周夢裏忙一聲笑處一聲愁强帶三分利嘴頭默地藏鋒人不測方知歇手了長夜迢迢正小春荻花招我到江濱行來玄鶴鳴寒月喚醒黃粱有幾人金闕朝囘駕紫鸞漫吹短笛下層巒堪憐塵世勞勞客百𡻕光陰指一彈輕寒輕暖麥秋天人世炎凉景亦然探得箇中消息著觸來何處不仙仙枷鎻相纒未數年姻緣宿世已牽連而今還作黃粱夢淚濕鴛鴦枕畔邊何事勞形燕市中跼天蹐地逐西東一官偶得淸閒地遇我眞如黃石公陳王詞賦等雕蟲任彼時人點染濃濂洛遺書護命寶急須尋著主人公詠茶陸羽茶經似可刪龍團誰信產名山近來雖抱相如渴茗椀泉鐺盡日閒示雲巢諸子四首霞觴滿酌樂逍遙懶向人間問暮朝今夜月明風又便乘鸞扶醉到南巢心香時達到雲天萬里乘風駐錦韉欣看南巢諸父老歡呼今又見囘仙笙歌隱隱拂雲開邀得羣眞踏月來纔向瑤池醉玉液筵前又進紫霞杯半山鐘磬度黃昏隱隱聲聞水竹村閉戸誦經人不到一灣新月照柴門示邵萬善重輯金丹示掌初編一樹花開朶朶紅千年古柏翠如桐今朝重整金丹後萬法歸源道炁充春日山居四首小桃初破未聞香翠燕羣飛集話長纔看黃庭經一卷日移花影上迴廊江梅已破兩三枝漸見春光日影遲塵世難逢開口笑㩦樽山畔採靈芝伊人𣺌𣺌在蒼葭雲靜山頭露曉霞自結短籬稱大隱柴門偷放兩梅花淸閒可共鷺鷗盟何事紅塵閙裏行卻喜山花睛正好櫻桃火酒聽倉庚夏日山居三首巖松挺幹虬鬚古徑竹抽捎鳳尾新春去客窗渾不覺東風囘首笑癡人茅簷小小屋三間庭際蛙鳴草不刪別有性情輕黻冕獨將茗椀看溪山榴花何事戀薰風吹縐山阿一抺紅寄跡烟霞同志侣數杯蒲酒度天中秋日山居山居最樂是新秋夜靜風微景更幽踈磬數聲明月裏參差竹影弄金鈎仙况四首瑶天笙鶴兩行飛北極明星拱太微玉輦移來淸鳳闕庭前草木鬥芳菲靑鳥齊鳴十二洲巓涯好景掌中收紅塵不惹桃花片三月黃雲擬暮秋寂厯空山聽鳥音泉聲松籟等鳴琴從知物外幽人致自有蕭然太古心半晴半雨半陰陽靜極方知日月長莫道此間無實獲黑甜一覺悟黃粱題飛英寺靑苔古刹㙮崚𡾓閱盡飛英寺裏僧夜靜鑼聲鳴月下沿溪船上戲龍燈示人二首三徑無媒草自蕭龎通載酒事云遙舊時五柳今何在猶記城南啞口橋黃鸝斗酒甚荒唐老大徒追俠少場一曲關山羌笛裏平沙片月鬢如霜題雲巢精舍六首精舍森森翠竹幽睛空片片綵雲浮問誰高據山腰裏卻是苕南第一流竹徑紆迴見短墻新聲百鳥弄笙簧春光宛似私巢舍先放梅花一樹香草長閒階花木幽爐香縹緲篆烟浮簷迎㙮影孤峯入門繞湖光一水流閱厯紅塵一布衣菰城深處有柴扉春來屢試鳥程酒風起楊花喚客歸西山翠色果佳哉明月依依宿鳥囘小徑廵行看不厭薔薇籬畔送香來爐烟裊裊小堂閒爲愛山阿未忍還小摘園蔬堪共飽推窗紅日滿西山夜坐有感小窗梅影入簾靑一卷南華對短檠忽聽笙歌天際落隔墻領取步虛聲示皈玄女金爐香㪚達穹蒼閨閣欽心奉法王會得箇中玄妙理瑶池添郤一紅粧論道二十一首欲究玄功得道梯正心誠意是眞基橫雲吹處濃珠露淸性偏逢道徑迷淸心一點是林泉盤膝磯頭坐幾年探得源流眞消息存來何處不仙仙問誰參得此玄機一曲鸞笙下翠微滿袖雨雲剛拂去瀛洲囘首又依稀數按梅花康節詩先天圖象後天知六陽不是成形律得手方知讀繫辭三昧從來無實踐工夫只在性中天一團和氣包涵足入手玄機細細研學道方知集化工天然氣宇太和通靜中悟得黃庭理面壁心思用不窮半室閒居避俗塵閙中尋趣養精神全眞不藉泥丸力鍊就元神勝萬緡綠柘陰稀蠶罷時機人杼軸漸成織來都是天孫錦妙手裁成紫蓋衣蒲團坐破見飛仙爐火功深三十年不必蓬萊尋道客丹成九轉遇眞緣性理工夫一點眞光昭萬物甚淸明功成魚躍鳶飛候柳影風吹處處晴欲識蓬萊眞面目應知此地叩仙關吾今約汝無多語半點靈機半粒丹萬字千言講不窮會心一語顯黃鐘工人擊出明堂奏瓦缶齊鳴集大通天外飛來碧玉峯白雲來往自西東紅爐一點乾元透共向山中認醉翁乾坤小小一花村聚散無常水上萍此際若能參透得浮雲吹散現氷輪上馬飛來走一朝虗空踢破玉江潮山巓透出西江月高接天巖道子橋尋春尋到五湖溪漸近桃源路不迷爲問葛天當日事黃童仍說舊東西若個能參古與今抛開名利到山林而今藉此朝元日領取當前一點眞非眞非假不須猜翦得餘光入卷來妙手天成點綴好數言刪定向天台印沙成字跡如仙筆底龍蛇紙背堅透得玄關成妙用餘光穿破洛陽箋寂寂無聲聽遠鐘黃庭未悉抱䝉童風雲會合三靈處水火交成一道同修玄莫把利名牽福夀榮華命自天今日鸞橋傳法語勸君時刻記心田詠蓮花三首彷彿桃花洞裏天爐香衝破夕陽烟一輪圓影當空度綠水紅衣別樣妍簾捲秋風漏未殘月明人靜倚朱欄愛他出水涓涓淨不染汙泥數點瘢橫斜欹側滿銀塘無語低頭暗自傷蓮子淸心心最苦世間容易得甜嘗自詠八首我本蓬萊一醉仙提壺曾汲井中泉自從東老西歸去不到東林五百年雲淨風高雨後天數枝枯樹淡無烟枝藜何處尋仙跡我在蓬萊最上邊十洲三島是吾家去去來來意自賖欲識洞中眞息耗白雲深處問嬌娃欲向人間記大年何如瀟灑學羣仙純陽亦是勞勞客擺脫方知世外天兩袖淸風德自嘉洗心滌慮絶塵華有人問我名和姓紫竹林中一道家天作高山雲作梯空來何處不停車莫言仙老非凡客在昔原同塵世居不入詩豪與酒豪樂陶陶處樂陶陶陶然物外人忘我踏到天台路不遥蓬壺頂上御長風十二樓頭月正中問我葫蘆容幾許乾坤天地一鴻濛寓意二首城南別業據山塢慕道咸來叩大羅寄語柴桑籬畔客綠烟猶似昔時無赤觸塵寰𡻕己闌布袍無恙不知寒此間若箇全眞侣倩我山人另眼看示諸子三首偏材何必遜全材一首新詩會意裁探得箇中深義味俗塵三斗不須猜傍水梅花初放香江南人物摘瑶章題來都是淸新句紙價方期貴洛陽讀罷經言釋繫辭名言健筆壯文思理深玄窟靈心解道者方成學者詩偶題二十五首捉得金精固命基日魂東畔月華西於今煉就長生藥服了還同天地齊莫怪瑶池消息稀只緣人事隔天機若人尋得水中火有一黃童上太微混元海底隱生倫内有黃童玉帝名白虎神符潛姹女靈元鎭在七元君三畝丹田無種種種時須藉赤龍耕會將此種教人種不解鉛池道不生閃灼虎龍神劍飛好憑身事莫相違傳時須在乾坤力便透三淸入紫微不用梯媒向外求還丹只在體中收莫言大道人難得自是功夫不到頭飲酒須教一百盃東浮西泛自梯媒日精自與月華合有箇明珠走上來不負三光不負人不欺神道不欺貧有人問我修行法只種心田養自身時人若擬去瀛洲先過巍巍十八樓自有電雷聲震動一池金水向東流瓶子如今玉子黃上升下降續神光三元一會經年淨這個天中日月長學道須教徹骨貧囊中只有五三文有人問我修行法遥指天邊日月輪我自忘心神自悅跨水穿雲來相謁不問黃芽肘後方妙道通微怎生說獨上高峯望八都黑雲散後月還孤茫茫宇宙人無數幾個男兒是丈夫天下都遊半日功不須跨鳳與乘龍偶因博戱飛神劍摧郤終南第一峯趯倒葫蘆掉郤琴倒行直上卧牛岑水飛石上迸如雪立地看天坐地吟吾今本住在天齊零落白雲鎻石梯來往八千消半日依前歸路不曾迷蓮峯道士高且潔不下蓮宫經𡻕月星辰夜禮玉簪寒龍虎曉開金鼎𤍠東山東畔忽相逢握手丁甯語似鐘劍術已成君把去有蛟龍處斬蛟龍朝泛蒼梧暮郤還洞中日月我爲天匣中寶劍時時吼不遇同人誓不傳偎巖拍手葫蘆舞過嶺穿雲拄杖飛來往八千須半日金州南畔有松扉養得兒形似我形我身枯悴子光精生生世世常如此爭似留神養自身精養靈根氣養神此眞之外更無眞神仙不肯分明說迷了千千萬萬人不事王侯不種田日高猶自抱琴眠起來旋點黃金買不使人間作業錢天涯海角人求我行到天涯不見人忠孝義慈行方便不須求人自然眞莫道幽人一事無閒中儘有靜工夫閉門淸晝讀書罷掃地焚香到日晡雜體詩三字訣這個道非常道性命根生死竅說著醜行著妙人人憎個個笑大關鍵在顚倒莫厭穢莫計較得他來立見效地天泰爲朕兆口對口竅對竅吞入腹自知道藥苗新先天兆審眉間行逆道氣要和神莫耗若不行空老耄認得眞老還少不知音莫語要些兒法合大道精氣神不老藥靜裏全明中報乘鳳鸞聽天詔去塵銘心惟不二是曰靜機物我無別形神皆歸願言寤寐不落是非入世出世我貴知希洗心銘洗心云何澡雪明德塵去鑑瑩玷捐圭潔不澄而淸其源則活我纓我足可以弗濯題像這個道人不言不語淸淨無爲守雌獨處不去那海上三山逍遥自在郤到此濁世塵寰凉凉踽踽咦想是老婆心切因此逢人便與勸世一毫之善與人方便一毫之惡勸君莫作衣食隨緣自然快樂算是甚命問什麽卜欺人是禍饒人是福天眼昭昭報應甚速諦聽吾言神欽鬼伏無題三首但安神息妙合自然纔有所著卽落邪道伏氣不服氣服氣須伏氣服氣不長生長生須伏氣玄牝玄牝眞玄牝不在心兮不在腎窮取生身受氣初莫怪天機都洩盡長短句坐玉龍飛彩鳳洋洋河海吹淸簫歌雅句落落雲宫今日雨明日風安然乾坤在其中人皆稱我是仙翁春日郊遊春山㩦伴看花野水舟橫聽蛙借問身居何地白雲深處爲家觀感掠水蜻蜓剛去尋香蜂蝶旋來爲問紛紛何事小園籬菊初開閒吟漫將搰拙紅燒細煮松聲一瓢聽誦妙經堪消良夜迢迢題雲巢精舍頻來此地留蹤遠望雲橫老松夜坐書齋待月閒聽古寺䟱鐘贈龍門樵夫此上見箇樵老道骨仙風飄𣺌冬爐夏扇不用淸福世外逍遙示人我欲尋仙作侣茫茫四海無眞今朝得遇有緣人好把乩沙相贈洵屬道緣深厚將來不讓行誠西南開闡得斯臣正是予門深幸示柳亭努力加餐飯隨時過光陰泉流石上三更月風響喬松一曲琴自是舊來塵外客香雲豈是世間情四言詩傾蓋如是去留無滯何去何從聊展半技明矣明矣馬首之東行矣行矣九月之中言遠不遠言近不近活潑天機隱顯莫定淸一念不起萬緣何生虗無浩浩月白風淸靜外境不侵内神自定一點靈光瑩然自靜道無爲理深尋之越奥信手拈來是名曰道德德亦無形物無不育物旣含生是爲眞德行法界雖宏厯之可越足步淸風手㩦皓月住動則難言靜亦無說動靜兩忘中間且歇坐心滅寒灰身忘土塊黙黙冥冥光耀三界卧淸靜家風希夷妙訣放開四大萬緣齊滅詩餘示人爾別已多年今日相逢是昔緣了得無生一曲宣唱別陽關道仙凡感舊緣打疊行囊春風細雨鮮花花世界無偏總要人心奠靑鋒劍寒光電飛過洞庭湖十二欄杆遍雲掛柳梢頭月在天心現空洞洞說甚麽仙家奥妙玄九霄光淨淨澄澈玉壺禪示眾元機吟漸漸明一脉相承不是小可論鶴童聽