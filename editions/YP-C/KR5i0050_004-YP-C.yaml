body:
  text: 詩集下卷五言絶句示人四首秋興四首上元卽事囘山秋暮題仲子書齋題新月壇明心養性示蔡靜一指迷二首琴棊書畫示學人題王子書齋立秋晚步見屏間聯句題此龍門古洞示津源題像二首偶吟二首山僧廣莫悟道七言絕句遊五臺山遊九華山謁武當山陟卧龍崗觀武候遺跡有感贈趙道士醒世二首覺夢覈玄卽事詠梅金丹元夕前二日示殷秉誠示體恕二絕句示蔭誠六絕句示允誠六絕句偶吟十四首示野航道人漫興示人五首示吳一恕長樂崶四首太上洞前偶題三首贈龍門樵夫偶題指玄三十二首金剛經後三十二偈雜詠七絕卽景言情偶成六十數夜歸觀燈契道詠梅卽事無題仲春仙術秋過在園示人二首示得虛示人三首夕話批丹經註内竅中覓竅妙裏現妙句供草蘭七月内題和許旌陽韻枕石偶吟二首題像五首偶吟二首絕句二首金丹清溪兩丸僧舍偶題題杭州玄妙觀蕉上詩示道士趙肖仙無題示覺子題葛仙翁註黃庭肺部詩題靜陽邱眞人註黃庭心部詩山中卽事曉晴杏花桂花二首秋興新月重陽前五日秋夜過葦菴籬菊初冬卽事雪中早春夏夜卽事醉後點筆偶吟十二首戒酒戒色戒財戒氣戒愁心燈心地心劍心印心鏡心月最玄吟二十五首春日二首春景二首寒食雨中梅花二首漁隱初秋秋景四首重九二首重陽日霽暮秋二首月下賞桂六首詠菊小春冬至詠雪詠竹二首覺世十首詠茶示雲巢諸子四首示邵萬善重輯金丹示掌初編春日山居四首夏日山居三首秋日山居仙况四首題飛英寺示人二首題雲巢精舍六首夜坐有感示皈玄女論道二十一首詠蓮花三首自詠八首寓意二首示諸子三首偶題三十五首雜體詩三字訣去塵銘洗心銘題像勸世無題三首長短句春日郊遊觀感閒吟題雲巢精舍贈龍門樵夫示人示柳亭四言詩清靜道德行住坐卧詩餘示人示眾偶詠供蘭供酒夕話示野航二首卜算子悟道浪淘沙蘇幙遮滿庭芳酧江月水龍吟促拍滿落花沁園春三闋天仙子臨江仙三闋西江月醒世落花誌慨初冬警世春興醉後漫興多寶令活性靈詞清心妙論歌念佛雙聲子尾聲偶作疇昔辭示眾瀟湘神憶江南七首惜青春送新凉金丹現梧桐影漁父詞二十首夢江南詞十一首望江南减字木蘭花西江月八首雨中花題岳陽樓戲作道情詞示津源道情曲九首漁樂曲九首附敲爻歌有注谷神歌有注百字碑有注法語丹訣二首有注
