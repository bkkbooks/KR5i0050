盞詩一篇暮醉朝吟不記年乾馬屢來遊九地坤牛時駕出三天白龜窟裏夫妻會青鳳巢中子母圓提挈靈童山上望重重曡曡是金錢認得東西木與金自然爐鼎虎龍吟但隨天地明消息方識陰陽有信音左掌南辰攀鶴羽右檠北極剖龜心神仙親口留斯旨何用區區向外尋一本天機深更深徒言萬劫與千金三冬大𤍠玄中火六月傷寒表外陰金爲浮來方見性木因沉後始知心五行顚倒堪消息返本還元在己尋我家勤種我家田内有靈苗活萬年花似黃金苞不大子如白玉顆皆圓栽培全賴中宫土灌漑須憑上谷泉直候九年功滿日和根拔入大羅天尋常學道説黃芽萬水千山覓轉差有畛有園難下種無根無腳自開花九三鼎内烹如酪六一爐中結似霞不曰成丹應換骨飛昇遙指玉皇家四六關頭路坦平行人到此不須驚從教犢駕轟轟轉儘使羊車軋軋鳴渡海經河稀阻滯上天入地絶欹傾功成直入長生殿袖出神珠徹夜明九六相交通氣和河車晝夜迸金波呼時一一關頭轉吸處重重脈上摩電激離門光海嶽雷轟震戸動娑婆思量此道眞長遠學者多迷溺愛河金丹不是小金丹陰鼎陽爐裏面安盡道東山尋汞易豈知西海覓鉛難玄珠窟裏行非遠赤水灘頭去便端認得靈竿眞的路何勞禮月走星壇古今機要甚分明自是羣生力量輕盡向有中生有質誰能無裏見無形眞鉛聖汞徒虛費玉室金關不解扃本色丹瓢推倒後卻吞丸藥待延齡浮名浮利兩何堪回首歸山味轉甘舉世算無心可契誰人更與道相參寸猶未到甘談尺一尙難明强説三經卷葫蘆并拄杖依前擔入舊江南本來無作亦無行行著之時是妄情老氏語中猶未決瞿曇言下更難明靈竿有節通天去玉藥無根得地生今日與君無恡惜成功只此是蓬瀛解將火種種刀圭火種刀圭世豈知山中長男騎白馬水邉少女牧烏龜無中出有還丹象陰裏生陽大道基顚倒五行憑匠手不逢匠手莫施爲三千餘法論修行第一燒丹路最親須是坎男端的物取他離女自然珍烹成不死砂中汞結出長生水裏銀九轉九還功若就定將衰老返長春欲種長生不死根再營陰魄及陽魅先教玄母歸離戸後遣空王鎭坎門虎到甲邉風浩浩龍居庚内水温温迷徒爭與輕輕泄此理須憑達者論閉目存神玉戸觀時來火候遞相傳雲飛海面龍吞汞風擊巖顚虎伏鉛一旦煉成身内寶等閒探得道中玄刀圭餌了丹書降跳出塵籠上九天千日功夫不暫閒清車搬載上崑山虎抽黑汞安爐裏龍發紅鉛向鼎間仙府記名丹已熟陰司除籍命應還彩雲捧足歸何處直入三清謝聖顏解匹眞陰與正陽三年功滿結成霜神龜出入庚辛位丹鳳翺翔甲乙方九鼎先輝雙瑞氣三元中換五毫光塵寰若有同機者共住烟霞不死鄉修生一路就中難迷者徒將萬卷看水火均平方是藥陰陽差互不成丹守雌勿失雄方住在黑無虧白自乾認得此般眞妙訣何憂風雨姤衰殘纔吞一粒便安然十二重樓九曲連庚虎循環飡絳雪甲龍夭矯迸靈泉三三上應三千日九九中延九萬年須得有縁方可授未曾輕泄與人傳誰知神水玉華池中有長生性命基運用須憑龍與虎抽添全藉坎兼離晨昏點盡黃金粉頃刻修成玉石脂齋戒餌之七日後等閒輕舉上雲梯九天雲靜鶴飛輕銜簡翩翩別太清身外紅塵隨意換爐中白石立時成九苞鳳向空中舞五色雲從足下生回首便歸天上去願將甘雨救焦氓嬰兒迤邐降瑤階手握玄珠直下來半夜紫雲披素質幾回赤氣掩桃顋微微笑處機關轉拂拂行時戸牖開此是吾家眞一子庸愚誰敢等閒猜才得天符下玉都三千日裏積功夫禱祈天地開金鼎收拾陰陽鎖玉壺便覺凡軀能變化深知妙道不虛圖時來試問塵中叟這箇玄機世有無誰識寰中達者人生平解法水中銀一條拄杖撑天地三尺昆吾斬鬼神大醉醉來眠月洞高吟吟去傲紅塵自從悟裏終身後嬴得蓬壺永劫春亦無得失亦無言動卽施功靜卽眠驅遣赤牛耕宇宙分張玉粒種山川栽培不憚勞千日服食須知活萬年今日示君君好信教君見世作神仙不須作態與裝腔祇在崑崙第一樁逢潤自然情易伏遇炎常恐性難降有時直入三元戸無事還歸九曲江世上有人燒得住夀齊天地更無雙本來無非在玉都亦曽陸地作凡夫吞精食氣先從有悟理歸眞便入無水火自然成旣濟陰陽和合自相符爐中煉出延年藥溟渤從教變復枯無名無利任優游遇酒逢歌且唱酬數載未曽經聖闕千年惟只在仙洲尋常水火三回進眞箇夫妻一處收藥就功成身羽化更抛塵坌出凡流杳杳㝠㝠莫問涯雕蟲篆刻道之華守中絶學方知奧抱一無言始見佳自有物如黃菊蘂更無色似碧桃花休將心地虛勞用煮鐵燒金轉轉差還丹功滿未朝天且向人間度有縁拄杖兩頭擔日月葫蘆一箇隱山川詩吟自得閒中句酒飲多添醉後錢若問我修何妙法不離身内汞和鉛半紅半黑道中玄水養眞金火養鉛解接往來三寸氣還將運動一周天烹煎盡在陰陽力進退須憑日月權只在功成三島外穩乘鸞鳳謁諸仙返本還元已到乾能升能降號飛仙一陽生是興功日九轉周爲得道年煉藥但尋金裏水安爐先立地中天此中便是還丹理不遇奇人誓莫傳飛龍九五已升天次第還當赤帝權喜遇汞珠凝正午幸逢鉛母結重玄狂猿自伏何須煉野馬親調不著鞭煉就一丸天上藥頓然心地永剛堅舉世何人悟我家我家別是一榮華盈箱貯積登仙錄滿室收藏伏火砂頓飲長生天上酒常栽不死洞中花凡流若問吾生計徧地紛紛五彩霞津能充渴氣充糧家住三清玉帝鄕金鼎煉來多外白玉爐烹處徹中黃始知青帝離宫住方信金精水府藏流俗要求玄妙理參同契有兩三行紫詔隨鸞下玉京元君相命會三清便將金鼎丹砂餌時拂霞衣鶴駕行天上雙童持珮引月中嬌女執幡迎此時功滿參眞後始信仙都有姓名金丹一粒定長生須得眞鉛煉甲庚火取南方赤鳳髓水求北海黑龜精鼎追四季中央合藥遣三元八卦行齋戒興功成九轉定應入口鬼神驚道德崇高相見難又聞東去上仙壇杖頭春色一壺酒頂上雲攢五嶽冠飲海龜兒人不識燒山符子鬼難堪先生去後身須老乞與貧儒換骨丹碧潭深處一眞人貌似桃花體似銀鬚髮未班縁有術紅顏不老爲通神蓬萊要去如今去架上黃衣化作雲任彼桑田變滄海一丸丹藥定千春爐養丹砂鬢不斑假將名姓住人間已逢志士傳神藥又喜同流動笑顏老子道經分付得少微星註共相攀幸蒙上士甘撈摝處世輸君一箇閒誰解長生是我栽煉成眞氣在三台盡知白日升天去剛逐紅塵下世來黑虎行時傾雨露赤龍耕處產瓊瑰只吞一粒金丹藥飛入青霄更不回亂雲堆裏表星都認得深藏大丈夫綠酒醉眠閒日月白蘋風定釣江湖長將氣度隨天道不把言詞問世徒山水路遙人不識茅君消息近知無鶴爲車駕酒爲糧爲戀長生不死鄕地脈尙能縮得短人年豈不展教長星辰往往壺中見日月時時袖裏藏若欲時流親得見朝朝不離水銀行靈芝無種亦無根解飲能飱自返魅但得烟霞供𡻕月任他烏兔走乾坤嬰兒只戀陽中母姹女須朝頂上尊一得不回千古内更無塜墓示兒孫世上何人會此言休將名利掛心田等閒倒盡十分酒偶與高吟一百篇物外烟霞爲伴侣壺中日月任嬋娟他時功滿歸何處直駕雲車入洞天玄門弟子坐中央算得明長感玉皇枕下山河和雨露笛中日月混瀟湘坎男會遇逢金女離女交騰嫁木郎眞箇夫妻齊守志立教牽惹在陰陽遙指高峯笑一聲紅霞紫霧面前生每於㕓市無人識長到山中有鶴迎時弄玉蟾驅鬼魅夜煎金鼎煮瓊英他時若赴蓬萊洞知我仙家有姓名堪笑時人問我家杖擔雲物惹烟霞眉藏火霓非他説手種金蓮不自誇三尺焦桐爲活計一壺美酒是生涯騎龍遠出遊三島夜久無人翫月華九曲江邉坐臥看一條長路入天端慶雲捧擁朝天闕瑞氣徘徊起白烟鉛汞此時爲至藥坎離今日產神丹功能濟命長無老只在人心不是難玄門玄理又玄玄不死根元在汞鉛知是一搬眞箇術調和六一也同天玉京山上羊兒閙金水河中石虎眠妙要能生覺本體動心到處自如然公卿雖貴不曽酬説著仙鄕便去遊爲討石肝逢蜃海因尋甜雪過瀛洲山川醉後壺中放神鬼閒來匣裏收據見目前無箇識不如杯酒混凡流曽邀相訪到仙家忽上崑崙宴月華玉女控攏蒼獬豸山童提挈白𧎚蟇時斟海内千年酒慣摘壺中四序花今在人寰人不識看看揮袖入烟霞火種丹田金自生重重樓閣自分明三千功行百旬見萬里蓬萊一日程羽化自應無鬼錄玉都長是有仙名今朝得赴瑤池會九節幢旛洞裏迎因看崔公入藥鏡令人心地轉分明陽龍言向離宫出陰虎還於坎位生二物會時爲道本五方行盡得丹名修眞道士如知此定跨赤龍歸玉清浮生不實爲輕忽衲服身藏奇異骨非是塵中不染塵焉得物外通無物共語難兮情兀兀獨自行時輕拂拂一點刀圭五彩生飛丹走入神仙窟莫怪愛吟天上詩蓋縁吟得世間稀慣飱玉帝宫中飯曽著蓬萊洞裏衣馬踏日輪紅露捲鳳銜月角擘雲飛何時再控青絲轡又掉金鞭入紫微黃芽白雪兩飛金行卽高歌醉卽吟日月暗扶君甲子乾坤自與我知音精靈滅跡三清劍風雨騰空一弄琴的當南遊歸甚處莫教鶴去上天尋雲鬢雙明骨更輕自言尋鶴到蓬瀛日論藥草皆知味問著神仙自得名簪冷夜龍穿碧洞枕寒晨虎臥銀城來春又擬擕笻去爲憶軒轅海上行龍精龜眼兩相和丈六男兒不奈何九盞水中煎赤子一輪火内養黃婆月圓自覺離天網功滿方知出地羅半醉好吞龍鳳髓勸君休更認彌陀强居此境絶知音好景雖多不合吟詩句若宣卿相口姓名還動帝王心道袍薜帶應慵掛隱帽皮冠尙懶簪除此更無餘箇事一壺村酒一張琴華陽山裏多芝田華陽山叟復延年青松巖畔攀高幹白雲堆裏飲飛泉不寒不熱神蕩蕩東來西去氣綿綿三千功滿好歸去休與時人説洞天天生不散自然心成敗從來古與今得路應知能出世迷途終是任埋沉身邉至藥堪攻鍊物外丹砂且細尋咫尺洞房仙景在莫隨波浪沒光陰自隱玄都不記春幾回滄海變成塵玉京殿裏朝元始金闕宫中拜老君悶卽駕乘千𡻕鶴閒來高臥九重雲我今學得長生法未肯輕傳與世人北斗南辰掌内觀潛通造化暗相傳金鎚袖裏居元宅玉戸星宫降上玄舉世盡皆尋此道誰人空裏得玄關明明道在堪消息日月灘頭去又還六龍齊駕得升乾須覺潛通造化權眞道每吟秋月澹至言長運碧波寒晝乘白鶴遊三島夜頂金冠立古壇一載已成千𡻕藥誰人將袖染塵寰五嶽灘頭景象新仁人方達杳㝠身天綱運轉三元淨地脈通時萬物春自曉谷神通此道誰能理性欲修眞明明説向中黃路霹𩆝聲中自得神欲陪仙侣得身輕飛過蓬萊徹上清朱頂鶴來雲外接紫鱗魚向海中迎姮娥月桂花先吐王母仙桃子漸成下𣊟日輪天欲曉定知人世久長生四海皆忙幾箇閒時人口内説塵縁知君有道來山上何似無名住世間十二樓臺藏祕訣五千言内隱玄關方知鼎貯神仙藥乞取刀圭一粒看割斷繁華掉卻榮便從初得是長生曽於錦水爲禪蛻又向蓬萊列姓名三住住來無否泰一塵塵在世人情不知功滿歸何處直跨虬龍上玉京當年時價滿皇都掉臂西歸是丈夫萬頃白雲獨自有一枝丹桂阿誰無閒尋渭曲漁翁引醉上蓮峯道士扶他日與君同際會竹溪茅舍夜相呼結交常與道情深日日隨他出又沉若要自通雲外鶴直須勤煉汞中金丹成只恐乾坤窄餌了甯憂病患侵未去瑤臺猶混世不妨杯酒喜閒吟因擕琴劍下煙蘿何幸今朝喜暫過貌象本來猶自可針醫偏更效無多仙經已讀三千卷古法曽持十二科些小道功如不信金階捨手試看麽傾倒華陽醉再三騎龍遇晚下南岩眉因拍劍留星電衣爲眠雲惹碧嵐金液變來成雨露玉都歸去老松杉曽將鐵鏡照神鬼霹𩆝搜尋火滿潭鐵鏡烹金火滿空碧潭龍臥夕陽中麒麟意合乾坤地獬豸機關日月東三尺劍橫雙水岸五丁冠頂百神宫閒鋪羽腹居仙窟自著金蓮造化功隨縁信業任浮沉似水如雲一片心兩卷通經三尺劍一條藜杖七絃琴壺中有藥逢人捨腹内新詩遇客吟一爵永添千載夀一丸丹點一斤金琴劍酒棊龍鶴虎逍遙落魄永無憂閒騎白鹿遊三島悶駕青牛看十洲碧洞遠觀明月上青山高隱彩雲流時人若要還如此名利浮華卽便休紫極宫中我自知親磨神劍劍還飛先差玉子開南殿後遣青龍入紫微九鼎黃芽棲瑞鳳一軀仙骨養靈芝蓬萊不是凡人處只怕愚人泄世機回身方始出埃塵造化功夫只在人早使亢龍抛地網豈知白虎出天眞綿綿有路誰留我默默忘言自合神擊劍夜深歸甚處披星帶月折麒麟春盡閒閒過落花一回舞劍一吁嗟常憂白日光陰促每恨青天道路賒本志不求名與利元心只慕水兼霞世間萬種浮沉事達理誰能似我家日爲和解月呼丹華夏諸侯肉眼看仁義異如胡越異世情難似泰衡難八仙煉後鍾神異四海磨成照膽寒笑指不平千萬萬騎龍撫劍九重關別來洛汭下東風醉眼吟情慵不慵擺撼乾坤金劍吼烹煎日月玉爐紅杖搖楚甸三千里鶴翥秦烟幾萬重爲報晉城仙子道再期春色會稽峯從容跨鶴出崑崙拂盡山河處處塵明月當天誰是道梅花滿眼未知春丹成白雪千壺酒夢破黃粱萬劫身收拾乾坤歸袖裏休勞漁父指迷津未煉還丹且煉心丹成方覺道元深每留客有錢酤酒誰信君無藥點金洞裏風雲歸掌握壺中日月在胸襟神仙事業人難會養性長生自在吟箕星昴宿下長天凡景甯教不愕然龍出水來鱗甲就鶴冲天去羽毛全塵中教化千人眼世上難知爾雅篇自是凡流福命薄忍教微妙略輕傳閒來掉臂入天門拂袂徐徐撮彩雲無語下窺黃谷子破顏平揖紫霞君擬登瑤殿參金母回訪瀛洲看日輪恰直嫦娥排宴會瑤漿新熟味氤氲曽隨劉阮醉桃源未醒人間欠酒錢一領布裘權且當九天回日卻歸還鳳茸襖子非爲貴狐白裘裳欲比難只此世間無價寶不憑火裏試燒看因思往事卻成憨曽讀仙經第十三武氏死時應室女陳王沒後是童男兩輪日月從他載九箇山河一担擔盡日無人話消息一壺春酒且醺酣垂袖騰騰傲世塵胡蘆擕卻數遊巡利名身外終非道龍虎門前辦取眞一覺夢魅朝紫府數年蹤跡隱埃塵華陰市内纔相見不是尋常賣藥人萬卷仙經三尺琴劉安聞説是知音杖頭春色一壺酒爐内丹砂萬點金悶裏醉眠三路口閒來遊釣洞庭心相逢相遇誰人識只恐冲天沒處尋青霄一路少人行休話興亡事不成金榜因何無姓字玉都必是有仙名雲歸大海龍千尺雪滿長空鶴一聲深謝宋朝明聖主解書丹詔召先生頭角滄浪聲似鐘貌如氷雪骨如松匣中寶劍時頻吼袖裏金鎚逞露風會飲酒時爲伴侣能吟詩句便參同年來定赴蓬萊會騎箇生𤢆九色龍神仙暮入黃金闕將相門關白玉京可是洞中無好景爲憐天下有眾生囊琴際會閒隨鶴匣劍時磨待斷鯨進退兩楹俱未應憑君與我指前程九鼎烹煎一味砂自然火候放童花星辰照出青蓮顆日月能藏白馬牙七返返成生碧霧九還還就吐紅霞有人奪得玄珠餌三島途中路不賖星辰聚會入離鄕日月盈虧助藥王三候火燒金鼎寶五符水煉玉壺漿乾坤反覆龍收霧卯酉相吞虎放光入室用機擒捉取一丸丹點體純陽無心獨坐轉黃庭不逐時流入利名救老只存眞一氣修生長遣百神靈朝朝煉液歸瓊瓏夜夜朝元養玉英莫笑老人貧裏樂十年功滿上三清時人受氣禀陰陽均體乾坤夀命長爲重本宗能夀永因輕元祖遂淪亡三宫時有迴流法萬物那無運用方咫尺崑崙山上玉幾人知是藥中王羅浮道士誰同流草衣木食輕王侯世間甲子管不得壺裏乾坤只自由數著殘碁江月曉一聲長嘯海山秋飲餘回首話歸路遙指白雲天際頭三千里外無家客七百年來雲水身行滿蓬萊爲別館道成瓦礫盡黃金待賓榼裏常存酒化藥爐中別有春積德求師何患少由來天地不私親寒暮萬里晴空魄正圓隔簾燈影鬬嬋娟聲聲棲鶻千年樹點點歸烏一抹天翦剩寒光雲出岫蕩殘晚色水生烟乘鸞此際來壇語極目乾坤一縷禪止源求詩咏此山老雲輕幾代秋白頭仙跡永悠悠誰將玉詔傳玄鶴我爲金書跨碧牛長嘯一聲天地大狂歌九極鳳凰遊壺中説有綿綿界欲子偕吾遍十洲仙况二首山骨嶙峋月蕊飛伯齊休採紫雲薇玉臺一弄玄黃韻金闕三敲太上闈道裏烟光吹九極袖中蟾氣放千輝遙梅肯贈於今夢落得青霞補絳衣萬山招隱片霞孤雙鯉沙前酒一壺峰插破雲天補色月妝新黛水描圖爛柯堪老多棋癖滌器奚童勝酒徒三楚六朝何所惜好來溪上伴鵜鶘還丹奥法玉雪宜人鳳鼎清黃芽初秀月初明雲烟遠上三千閣龍虎高聞九品經姹女多情頻醉鶴嬰兒無語卻啼鶯醍醐旣旨花休笑放浪爐頭聽汞鳴坐臥坐臥忘機劍影孤靈元一點合丹爐乾坤有象書千卷𡻕月無知酒半蘆唐世烟霞凝漢洞秦家桃李映蒼梧浮生解此毫端意歸去來兮大丈夫幽况山高不礙白雲深長嘯歸來和鳥音日暮天空聞遠磬月明松響聽遙琴苔茵雨過春新了桃李花飛色不禁三輔五陵誰有夢野人行樂只山林示引源十年精進甕中天今日酣心始合縁月餌釣君離苦海道機撥爾入微玄築基好盡三三法煉已還宜九九先夢覺羲皇西水碧歸來滿目是銀蟾示玄源空林皓月拂松蘿崦外泉聲和鳥歌三十年間清靜法九千里外有無河玄關未破神先壯紫闕初開氣自和但得重樓蟾蛻殻始知靈谷轉輕波示淵源肩橫一劍醉斜陽笑指天低水未長甲子不言方是覺庚申旣悟始知香烟雲拂地千年藥嬰姹窺爐萬載昌饒舌夜深題數語囑君入夢自思量示全眞守斗三首深山清靜總枯禪龍虎關頭始是縁明月照人白雪固黃芽入鼎紫霞堅默存我氣雲中劍淡悟玄風水底天遙指池臺生法相桔槹汲透井華泉龍虎關頭靜裏爲枯禪無説卻何之桔槹本是身中汲乾坎還從心内施滴滴醍醐搖玉液涓涓雨露灑金枝雖然清淨成玄訣只恐工夫下手遲心口原因我有身無身心口總非眞若云心口能成道豈説乾坤自合神明月眼前渾是舊曉風林外忽然新皮毛謝卻靈根在始悟桃花解醉人指玄篇十六首歎世凡夫不悟空迷花戀酒逞英雄春宵漏永歡娛促𡻕月長時死限攻弄巧常如猫捕鼠光陰猶似箭離弓不知使得精神盡願把身屍葬土中昔年我亦赴科場偶遇仙師古道旁一陣香風飄羽袖千條雲帶遶霓裳開言句句談玄理勸世聲聲唱洞章我貴我榮都不羨重重只教煉黃房玄篇種種説陰陽二字名爲萬法王一粒粟中藏世界半升鐺内煮山江青龍駕火遊蓮室白虎興波入洞房此個工夫眞是巧得來平步上天堂尋天撅地見天光種得金花果是强那怕世間諸餓鬼何愁地下老𨶒王正心收住黃龍髓張口擒吞白虎漿不是聖師當日訣誰能做得這文章一三五數總皆春後地先天見老君花發西川鋪錦繡月明北海慶風雲好抛生計於斯覓莫逞浮華向外尋念念不忘塵境滅靜中更有別乾坤世間無物可開懷奉勸世人莫自埋好趂風雲眞際會須求鸞鳳暗和偕兩重天地誰能會四箇陰陽我會排會得此玄玄内事不愁當道有狼𧲣前弦之後後弦前圓缺中間氣象全急捉虎龍坎上戰忙將水火離中煎依時便見黃金佛過後難逢碧玉仙悟得聖師眞口訣解教屋下有青天修仙善士莫痴迷於此宜當早見機花發拈花須仔細月明賞月莫延遲得來合口勤烹煉旣濟休工默守持從此不須心懊惱管教平步宴瑤池要知大藥妙通神不是凡砂及水銀世上藥材俱是假人間水火總非眞有形有質何須煉無象無名自可親一得便超三界外乘鸞跨鶴謁楓宸天機不洩世難知洩露天機寫作詩同類鑄成驅鬼劍共床作起上雲梯人須人度超凡世龍要龍交出汚泥莫怪眞情多實説只縁要度眾羣迷返本還元已到乾能升能降作飛仙一陽發是興工日九轉週爲得道年煉藥但尋硃裏汞安爐先立地中天此中就是還丹理不是其人莫妄傳天生一物變三才交感陰陽結聖胎龍虎順行陰鬼去龜蛇逆往火神來嬰兒日飡黃婆髓姹女時斟白玉杯功滿自然居物外人間寒暑任輪迴先天一氣號虛無運轉能交骨不枯要識汞根尋蒂子欲求鉛本問仙姑人人會飲長生酒個個能成不死夫色卽是空空卽色朗然飛過洞庭湖大道玄機顚倒顚掀翻地府要尋天龜蛇共穴誰能見龍虎同宫孰敢言九夏高山生白雪三冬奮火種金蓮叮嚀學道諸君子好把無毛猛虎牽地上靈芝天上安時中採得結純乾無根自有陽春至有本因多氣脈姹女戲時神力壯嬰兒舞處道心堅可憐世上無知識我得長生夀萬年勸君保重一分陰悟此仙機在用心只是人身常運轉何勞物外苦搜尋忙求北海初潮水灌濟東山老樹根此箇玄機重漏洩彈琴須要遇知音香烟偶結成雲金鴨香濃篆瑞烟山移雲片畫堂前飄空未有閒停意繞案幾忘欲斷涎聚散一時風作態升沉幾縷火爲縁甯同出岫無心侣隔住銀河障月圓雁鴻雁初辭關塞忙飛來已過楚瀟湘一聲呌月銀河冷兩翼凌風荻渚香聊卜平柯棲信宿慣傳芳訉自他鄕更觀擺得青天字惱説金釵十二行蠟梅老幹生花𡻕欲除風流不似舊西湖九天色相黃金闕一樹菩提蜜臘珠未向簷前驚漢主卻從菊後據江都小盆移置神仙側領取寒香入藥爐海上遊閒從海上寄遨遊一葦凌風勝巨舟水色忽搖波底日濤光斜映島中樓半天雲落三山塔萬里烟橫五老洲憑眺幾番雙眼濶長吟破浪返丹邱冬夜即事三杯客散洞庭幽帶醉擕琴跨鶴遊千里凍雲埋斷塔一聲寒雁送歸舟滄江寂寞魚龍冷野徑荒凉草木休放眼不知時序換春風猶自在心頭贈左玄長史不到今來便識荆氷壺秋月照春晴丹經有象方爲火琴到無弦更是聲風雨一簾開倦眼竹松半壁寫幽情洞中景物超然別肯向人間誤所生贈道旁苦人知君懷璧困柴荆門外花開一徑晴好客相邀傳道訣奇文高唱擲金聲燒殘短燭窮經夜踏遍名山勒馬情莫把靈聰閒裏用精魅石上悞三生贈外科醫生華老當年振漢荆將軍祖餞曉山晴因療關臂傳奇技還劈曹顱播遠聲一粒金丹千載行半匙水飲萬方情於何偷得青囊法恰向人間决死生贈内科醫生莫嘆相逢棘與荆春來別是一番晴閒遊芳草山稊色醉臥滄江鳥咽聲道入膏盲尋妙手仙爲盧扁慰幽情多縁曽作雲深客流落江南憶往生贈半舫居士閒過名園叩野荆闌干倚遍雨初晴桃花水上魚兒影楊柳風前燕子聲愧我才非徐孺匹感君酒達孔融情挑燈一話當年事莫道相逢是此生雁字六十首南來無意學雕蟲自寫寒暄寄化工青嶂遠依成石刻碧雲輕繞待紗籠年年潑墨難傅恨日日臨池不買窮仰面但隨人指識何須載酒問揚雄遺蹟無心上鼎鍾日來空際寫秋容孤飛一點臨張旭橫掃雙鈎學蔡邕遐舉暫看毫彩瘦低飛驚見墨花濃數行草草憑誰寄珍重天涯恕不恭寫遍長空念未降肯教輕集米家艭風驚健筆珠璣亂日度微陰點畫雙毫染露華揮碧落墨和烟影蘸秋江山腰淡繞晴嵐跡彷彿閒題上綠窗徘徊天際若尋詩日運霜毫寄遠思曽以短翰依日月聊將一晝學庖羲灘頭紅蓼供鉛槧塞外寒烟代墨池斜過北山眞復草不停風雨任紛披朝來染翰弄晴暉自寫元文傍紫微體勢每因風雪勁羽翰多爲稻粱肥新裁印月今還昔簡斷沉雲是也非遠去漸成蝌蚪跡漆痕猶帶碧雲飛誰把飛函寄太虛聯翩直上密還疎林間映月吹藜火天際乘風下石渠未可指名爲逸史何妨竟號作中書卿雲寫就宜春帖懸入遙空壯帝居天地秋容一畫圖標題留待羽衣徒摹成豈在曽啣荻書就何人敢覆瓿柳葉舊文排徤翮梅花新式間柔雛凌雲日向南齋過俯看操觚笑腐儒鳳毛鵬翮敢相齊五色徒教眩目迷曽以一行霄漢闊可知千首暮雲低晴招片片霞爲綺寒倩紛紛雪作題時繞桂林花正落秋風得意報金泥濡墨年年長幼偕疾徐濃淡任詼諧蝕殘已免芸窗蠧鏤篆難同蘚壁蝸眞本夜教明月習餘神時與白雲皆前生應是悲秋客鎭日書空未有涯一行青翰倚雲裁展翮知非百里才春雨棣棠書出塞秋風禾黍賦歸來翻憐晚陣塗皆亂卻笑中山頴易催天上羽裳新譜就塡詞日到白雲隈墨陣縱橫辨未眞斜飛如乙復如人怡情運翮從容搨得意呼朋仔細論影落石田千畫鐵羽招新月一鈎銀弋人不解憐文翰矰繳摧殘勝酷秦疎行密畫傍斜曛吹落南宫一片雲暫向世間稱墨客卻從天上作修文淩虛直去成飛白對月斜來帶八分倘教右軍今日見也應無意換鵝羣寫破晴空萬里痕幾行眞草動乾坤倡酧不倦偕妻子點畫相依仗弟昆寶額篆成臨帝闕素帘揮就掛江村遺文未肯傳金石鳥紀千秋古蹟存遙空一片碧琅玕幾處閒題賴羽翰天際儼然成筆陣風前竟爾作文瀾朝沾玉露毫初潤夜帶寒霜墨未乾驚逸忽看飛錯落天書直上五雲端羽檄紛馳度玉關南來題詠滿秋山神情獨自空中搆章法如從塞外嫺月下素書當夜檢日邉丹詔待朝頒年年旅食由揮翰風雨何嘗筆暫閒數行揮灑夕陽邉倒倚雲霞代蜀箋結搆偶然成古篆淋漓隨意得新聯悲鳴應恨饑難煮奮翮何從醉始顚獨向虛空展羽翰肯教凡蠧化神仙一行飛寄楚天遙文彩翩翩動九霄曉振羽衣揮露布夜含豪素染霜綃離情認作相思譜逸興翻爲招隱謠雨後偶從虹畔過卻於空際見題橋偶從天際演羲爻孤點爲單眾作交南國近來新墨藪北原應是舊書巢臨風欵欵文堪勒印水翩翩影欲抄關塞遠傳秋信好野人驚見亟于茅直向銀河濡彩毫書成豈爲寫牢騷江南塞北題皆遍白雪陽春調自高磐漸異文揮石鼓㝠飛清韻譜雲璈辭鋒遠卻還成陣忽變雙鈎作六韜共挾風霜夜渡河書成得意亦吟哦雖同染翰驚霄漢也爲能文觸網羅羽倦恨難酧筆債悲鳴豈屬困詩魔而今咄咄書空者盡向樊籠自作囮長空如水走龍蛇不向人間判五花染墨一生辭楚畹傭書半𡻕在天涯聯翩覓食如梭筆絡繹歸汀竟畫沙𧸛跡草眞眞好辨莫將疑似認寒鴉時將飛檄問穹蒼到處隨流翰墨莊雲暗有詩傳遠塞峯高無跡寄衡陽往來空運春秋筆行止何慚伏臘郎鴻寶自教千載重評衡奚用説鍾王遠入南天畫漸輕疾徐成象更分明徘徊寫出風雲幻嘹吟將月露清亦是熟觀渾脱舞也如曽見擔夫爭凌霄自足供揮灑不去閒題塔上名來賓天未試霜翎也有奇文照汗青塞曲寫成聊寄怨秋風賦就不堪聽濡毫時染金莖露傳績人稱使客星誰道竟無臨倣處玉關應是草元亭北來清健擬枯藤久集南天體格増腕下更無塵一點腹中應有墨千升聊成幅葉隨雲訂草就珠璣付水謄風雨夜來清翰濕遠傳孤墨上林燈旅信千行向熱投拂雲披月任風流肯教拘束烏絲幅直欲縱橫白玉樓驚夜似將符可竊來賓應有句先偷卽令懸市求人易隻羽千金未足酹何當天際見書淫寫出悠然萬里心羽鎩舞空翻倒薤首垂窺渚露懸針淡分蟬翼籠輕霧遠帶蠅頭遶暮林指點兒童勤倣習前山遮斷未能臨鏖戰西風墨更酣龍蛇飛影入秋潭相依月窟題團扇獨入霞天押錦函孤點每從頭上出雙鈎都向足邉含閒從法苑馳文藻散作天花聚作曇廣幅何人拓簡籖懸空飛舞任觀瞻影留寒月毫添墨行斷秋風句失粘書就有誰知白帖草完無地給青縑偶然忽向峯頭過幾處餘神繞筆尖爲譯番文説法嵒指揮瀟灑誦聲喃汀爲古硯蘆爲筆雲作奇箋霧作函載䞇侍臣時去國掌書仙史暫之凡興來不必勞呵凍舞雪題殘白練衫誰將醉墨灑秋空健筆高馳萬里風蘆沚偶過同曳白楓林間繞學題紅聯翩結搆雲中布彬雅文章天上雄古蹟至今曽未變何須重問九成宫聊從霄漢作書傭西抺東塗淡復濃風裏斷章還急就雲中垂勅又褒封天懸鐘鼎龍文逸洛影圖書鳥紀重高擲玉壺傾墨汁遺編時落華山峯無心論辨到雞窻羽翰偏能壓大邦弄月忽然書帶草凌雲應有筆如杠烟霞厯亂毫初展鈎畫參差距每雙健翮徧題天地濶豈同隻句説楓江來向南天補逸詩句成何用錦囊隨樓頭帶月題花萼洲上啣蘆寫竹枝天地影分奇偶變風雲道合語言奇步虛時有清詞醮永作人間一字師直書皆與世相違天地容光任發揮雪片斷行裁玉牒平沙遺譜上金𡽪須知自古書能化始信而今筆可飛高入暮雲猶未已似將窮想到非非奮翮秋風學著書千篇一律卷還舒揮成字句皆鴻寶賦就詞章盡子虛結陣似將傳檄定棲田應屬帶經鋤年年飛柬何嘗錯不用人間較魯魚持將清翰走雲衢椽筆難教尺幅拘不信世間存鳥紀可知天際有鴻儒縱橫自是描空手潦倒誰云潑墨圖低繞茂林楓正赤側邉斜點數行硃誰啓瑤函露赫㡗橫斜飛入白雲堤風流到處供揮灑月旦何人重品題碧落碑中添額篆素濤箋尾押新鷖流霞片片來相護國寶分明印紫泥筆底風雲入壯懷奇文宜向碧空排墨痕經雨篇章潤青簡埋雲體勢佳同就六書供藝苑助成八法倩朋儕暮歸蓼岸徘徊立寫就名園玉篆牌書來齊唱紫雲回鏤過晴空定不灾羽翰遠馳搖五岳文光直上接三台大書獨便高年看古篆還宜稚子猜詩寄隴頭揮卽到何須驛使更持梅露彩高懸絳帳新揮毫日日待嘉賓輕揚亦似臨初倦疾掃渾如腕有神絶壁偶依將勒石法幢斜繞欲書紳曽將體勢傳黃史指畫雖分總未眞一點斜飛悵失羣忽然依附助元文書箋散亂臨秋浦墨陣參差入暮雲古跡不因南北變新詞常被水天分自逃秦劫還千載避蠧何須更覓芸碧雲深處擁詞源肯復留蹤入兎園飛散鄴侯三萬軸排成柱史五千言雲書裁就馳霄漢霜信擕將度玉門柿葉滿林秋未老揮毫何用到慈恩曉空霜葉供書丹寶墨應知笑世酸奴學大家成澁體雛聯弱格得柔翰霜飛白簡秋毫勁雪映瑤篇夜氣寒筋節不教人易獲月明留句蓼花灘爲傳秋信度天關碌碌長途筆未閒眞草遠聯因雨集簡編中斷被風刪持將外史歸東壁賦就移文過北山時去稻疇書乞米千秋佳帖獨尊顏漠漠江天望草賢指揮不受白雲牽篇章成自關河外體法傳於畫卦先飛寄洞庭尋橘社下臨中澤覓蒲編似因書榜凌雲殿毫髮而今尙皓然大書揮破白雲寥振腕秋空暮復朝體格古今無異法文章南北盡同條螢光高下遙相燭鴉陣離披浪續貂自有碧霞供藻翰何須屋角種芭蕉卻疑天上搆書巢至令馳翰競拔茅錦帖全鋪菰草岸牙籖倒插荻花稍間成飛白能醫俗偶就迴文不解嘲隸跡篆文隨世變往來曽不費推敲長空呼伴寫離騷不借人間一字操書向雪中霏玉屑鋪來日下晒金韜因探禹穴山前聚豈避秦坑塞外逃俯看北窗飣餖客鬚髭拈盡首空搔夜持清翰渡銀河點畫參差法偃波寫就漫貽傖父笑書成當付雪兒歌同如直史惟操一不倩旁人代補戈欲向三山招羽士結將飛篆入雲窠年年飛翰寄天涯零落殘書泣路賒倣古更誰同逸少問奇何復見侯芭霞光春護成丹詔嵐色朝分覆碧紗白羽倦臨秋浦淨各將私記印平沙還同霄漢助天章霞彩緘封錦繡囊北溟蘸波餘墨瀋文昌舒氣接珠光縱橫不受風簷束瀟灑曽揮露布狂秋葉舞空黃更赤坐看飛帙擁縹緗天際森森調墨兵疑眞疑草復疑行揮毫滿眼雲烟落展翮千行風雨驚磐石就陽書盡曝蒲田覓食筆能耕自從點破虛無界肯似凡文共俗爭入夜能傳月露形指揮誰解太元經鋒鋩欲盡還成一鈎畫雖聯不識丁奮舉未須驕倚馬疾書何用照囊螢一行遠入南天去空見江峯數點青自是書家最上乘懸空曽未見橫稜雷門欲過疑轟石虹澗纔依更結繩莫道書傭無異法須知鳥跡擅奇能蹁躚肯學人間體空見天涯紙價騰閒挾風流汗漫遊墨痕斜灑白雲秋縱橫寫遍三千界鹵莽書殘四大州魚錦未須重問候鳳樓應自賴添修度河倒映明霞影紅葉題將出御溝荻花秋月照詞林毫管重教羨綠沈暮雪幾行歌落絮西風一抺寄來禽文章衰盛分南北翰墨流傳自古今照遍白雲霄漢濶何嘗掣肘費思尋奇跡應從禹穴探素毫終日染雲藍時招黨侣書纔就未得師模性已諳豈是雙文同社燕還將孤點法春蠶遙看尺一天邉過眞欲飛空啓露函南天幾點墨纎纎佳句秋空偶一拈奇幻空教人閣筆孤高不望世酬縑餘神且聽雲霞護逸致憑將風月添歸向平沙堆醉墨曉來隨處有遺銛本是書仙暫集凡遙空飛舞帶英咸聯成夜月詩千首翦破秋風墨一函似愛幅長書每縱如嫌筆滯羽頻芟江南送遍覊人信還向寥天報復緘長樂崶長樂崶下甚幽然升躡更知有洞天竹裏書聲留鶴島龕中琴韻透籬邉近山初長萬尋葛遙壑舊飛百丈泉來此屾林謁妙道濟濟猶是瀛洲仙龍門留題五首龍門峯高未易攀上有仙翁住中天雲門忽見千尋葛水外遙看百丈泉古道傍臨佛龕險遊客方知石樓閒曽昔相傳希夷洞爲今獨自樵夫眠樵夫夜傍西岩宿曉汲泉水煮藿藜日午中天正洗臉月到半空纔濯足焚香靜坐長飲酒朝星拜斗悟好書赤頭安閒石岩下自在神仙樂有餘仰觀龍門是畫圖樓臺洞閣漁樵夫日映松林千重翠月照清泉一顆珠遠聽琴韻浮伊水近聞書聲在石樓兩山仙佛無限趣今吾曽幸到此遊遍閱名山四十秋何處登高勝此遊遙望東西多空洞近觀南北伊水流山中長見樵夫睡河岸曽有漁翁舟巨杯滿酌狂歌醉世外逍遙遠王侯盛朝更有逍遙客樵夫長愛臥此岩身安清高眞仙侣心靜無塵知未來機術不讓管嚴子識見堪同周邵才相逢世人討酒貲但願長醉抱酒鐔偶題二首凡骨退來知幾載碧峯高臥餌玄霜青山古雪圍松榻仙掌寒雲鍊石房貝闕每攀瓊蘂嫩蟾宫時折桂花香爛然翠錦曽相唘許我同遊五帝鄕春來遊蕩到仙家戸列殊常二月花甲子盡推君行業庚申得遂不須誇各有清靈天外性肯忘混濁棄驕奢千日功夫如會得萬年歸去入烟霞喜黔楚會合迷濛法雨灑瑤階結篆浮空照九陔瑞藹江城清漢水福施黔域潤山苔仁風應逐和風遠紫氣還同道氣開笑指蓬壺跨鶴背已知良會合三才示黔楚合會飄飄鶴馭下天階仙仗千官不用排星斗稀疎橫漢表香雲繚繞散瓊齋靜中自得眞玄訣夢裏誰知妄念乖度世婆心惟一片清風應解老人懷示劉允誠鄧信誠不厭奔波出自然幾回來往駕雲駢化人願力空奢大度世心腸難棄捐一岫楚雲飛甸國數聲黃鶴唳南天從今又惹塵囂事幾許情縁擔在肩勉學淨几明窗不可虛莫貪幃箔失居諸但將經史三冬足定教鬚眉一旦舒筆彩豈縁枯坐授硯田當用苦工鋤老人於子無他贈五夜藜光數卷書閒詠振衣長嘯出金門鸞衞何須用虎賁孤鶴帶雛橫漢表雙鳬繫足踏天根雲中龍象疑無跡空際嬋娟若有痕俯視下方塵漠漠不堪回首對崑崙萬籟聲消月正斜御風直到主人家老翁得酒情偏廣稚子供花意可嘉棐几無塵聊試筆棗修不火只宜茶樓頭誰是知音者一曲清商付水涯夜咏朦朧月色映清虛鸞馭翩翩落御除道法得時惟罔象玄機露處有鳶魚誰能靜夜同參究我獨浮雲與卷舒若大乾坤人懵懵如何一個未情袪聽琴樓頭雅奏指生波鼓盪春風上玉珂逸韻冷然追太古元音淡泊得中和高山流水誰相賞操縵安絃自放歌但使人心都似此那能平地起干戈月夜新開寶鏡素光涵濯影流精勝十三天際遙臨因有約樓頭雅集不爲耽盡捐色相成玄悟獨會盈虛是老憨怪底諸生都夢夢良宵徒自付空談訓人何事勞勞死不休爲名爲利在心頭要知造化皆前定莫逞機心唘後憂大地有縁能自遇憑天付與莫他求廣行方便存陰德無事區區作馬牛寄示鸞書兩紙寄天南爲囑吾徒屬意看玉勅豈堪沈畫閣慈航終擬渡江干嘗思請制情何切莫謂捐金劫解難幾度乘雲臨楚會數聲鶴唳碧天寒示誠恕世事渾如東水流窮源須識有根由但參性命安天數不染塵囂向上頭坐破藤牀忘膝漏磨穿鵲頂務心修此般方見菩提種流水高山靜裏求示誠恕遊黔大道無言在本眞心篇娓娓敘根因今時鄂渚規模舊他日黔山氣象新有興趣時添興趣不精神處着精神須知三教原非二莫負玄元一派親偶題三首白雲飛渡楚江春晴日張翎出紫宸幾處紅霞鋪瑞錦繞堤翠柳欲生新鐘聲敲破迷人夢梵唄驚開客子魂舊日心情今日慰孰云仙侣棄凡塵鶴唳一聲下鄂城西風吹送四天清碾雲淨碧無纎障墜葉飄紅映晚晴宫廟肅雍人士靜鼓鐘震響鬼神驚中情欲話書難罄爲答黔南無限情凛凛朔風別鄂城今宵又到武陵春滿村細灑濛濛雨夾道平濡陌陌塵人事爭談新律吕天時忽變舊嶙峋一聲鶴唳通雲漢翦燭焚香迓至眞春日卽事曡曡春山景萬重庸流何處識天公鳶飛老樹蟠空翠魚躍沈泉驚落紅柳線滿畦誰可織秧針遍地孰爲縫玄關參透非難事須認堅貞一著功咏紅杏春色芳非月正三好花點綴小茅庵綠陰淺處詩魂瘦紅暈深時酒興酣逸士還期拈韻咏遊蜂未許入林探少陵何地無佳句莫把閒情付翠嵐夏日卽事三首拂面薰風透碧紗麥秋天氣最堪誇亭亭間出翁孫竹裊裊雙開姊妹花一派泉聲翻白浪四圍山色籠紅霞問誰幽處尋芳徑低蓋茅庵卽是家碧湖新漲滿沙汀處處田疇一半青柳繫漁舟依錦岸藤纒古寺護窗櫺窪樽有設誰爲主逸老無存孰可型最愛城南堪避俗仙家常在此間停一枝榴火報芳辰小院風清禮玉眞香帶白雲依緑樹神同仙侣降凡塵金鐘喚醒迷途客玉磬敲回夢裏人只恐到頭渾不悟此身常落愛河津五月五日寓意綵絲繫臂事荒唐續命豈因一絳囊天到中時陰盡伏地逢臘日晝方長降龍不藉青龍戲伏虎何須艾虎粧偷取長生無別訣蒲團久坐煉純陽端陽滿泛清樽醉玉壺龍舟久不見西湖家家競挽菖蒲劍處處爭懸桃葉符異地雖無馨角黍同人猶得聚生徒後期離合知多少此日年年笑語呼秋日卽事金菊香飄閬苑中數杯清茗醉盧仝蘆花冉冉秋衣白楓葉飄飄落帽紅兎藥不醫湖縐面羊裘頗耐鯉魚風吳山一席清閒地留與苕南贅世翁秋夜瑤臺彩暈獻中秋共向南巢結伴遊金粟琳瑯圓影動銀蟾掩映桂香浮何須迭奏霓裳曲且自頻斟碧玉甌諸客不煩憂盡醉冰桃可解宿酲不桂花秋光一派暗中催縹緲香浮徧遠垓玉殿未經攀桂手銀宫遙憶探花才搜來仙窟盈盈粟拂去塵階點點灰寄語封姨須謹護黃雲休使落汙萊咏雪瑞雪繽紛慶此辰曉窗乍唘畫圖新青山不老頭先白金屋搖光色變銀匝地鴉飛同潑墨漫天鶴舞墮修翎兒童赤手尋歡笑堆積瓊花塑玉麟醒世勸君早把利名刪𡻕月遷移若箇閒凍餒不侵堪閉戸康强無恙便開顏交遊合志留青眼世態忘情付白鷼治亂不聞姑自得何妨載酒看溪山一種清閒屬我徒百般冷淡脫塵拘白芽茶沸穿心礶黃熟香噴索耳爐村外丹楓顏獨厚籬邉黃菊意全孤窮通夀夭皆前定何用勞勞殫此軀宴罷二首萬朶紅雲護紫鑾太清宫裏會仙官月沈東海光微射星亘銀河夜未闌蓮漏聲含朝露冷蕙爐香帶曉霜寒歸來瑤島傾雲液笑看金烏走玉盤翻江倒海跨長鯨旋轉乾坤日月明一點丹成消劫劫三家聚會慶生生瓊漿已露千年意玉液猶存萬古情寄語雙成今日宴玄冰可解半朝醒再詣龍虎山訪道陵遺法龍虎山分龍虎形九州輿軸此爲眞若非塵世逢人傑不顯乾坤有地靈赤符禁院千年籙白鶴松間一片雲爲問師從何處去碧霞隈裏覓參芩咏松大夫久秉𡻕寒操厯盡冰霜不一撓攢翠纎針縁雨潤篩金香粉爲風飄根盤曲壤同潛蟄聲徹層雲作怒濤囑付樵斤休亂伐待看爲棟柱天朝咏梅隴頭眞性自清幽不逐趨炎一派流香韻暗從風裏度玉肌微向月中浮味將濃處烏偷眼花欲飛時笛倚樓回首羣英皆退遜孰爭先後共爲儔昔回鄕適遇𡻕荒罄貲產糧米賑濟饑貧得活數萬餘人鄕中耆老親屬勸存留貲產爲子孫計乃作此詩今以示學人㩋碎葫蘆踏碎琴飄然拂袖出儒林太初實相純如玉元始眞如瑩若金丹熖冲天神莫測劒鋒入地鬼難尋自從一覺黃粱後始信從前枉用心與衡山僧智玄得道純陽七百秋五湖四海任風流此身已出三千界一日須遊數十州醉倒清風明月夜踏翻紅蓼白蘋洲禪門衲子休相笑我在華嚴最上頭題湖州沈惟心家園亭壁上萬里來遊蜀道長杖藜閒玩百花莊誰家雞犬千家市中有神仙一島藏乳燕鳴鳩春自在落花飛絮水微茫主人了卻明甯事向此重開緑野堂示悟眞花雨瀰天泉外幽一絲不挂更何求松間鵲止原非險庭際鴉鳴莫昧由咒鉢蓮生聊爾爾談經石點亦休休金箆刮後全無著獅子聲中萬法收偶題二首從容跨鶴出崑崙拂盡河山處處塵明月當天誰是道梅花滿眼未知春丹成白雪千壺酒夢破黃粱萬劫身收拾乾坤歸袖裏休勞漁父指迷津香風縹緲駕仙鸞手執桃花仔細看七澤濤聲驚夜夢三湘烟樹帶雲寒岳陽曽醉何關酒員嶠稱仙豈是丹迴首唐虞成往事滄桑更變話無端示天基念佛䖍誠卽是丹念珠百八轉循環念成舍利超生死念結菩提了聖凡念意不隨流水去念心常伴白雲閒念開妙竅通靈慧念偈今留與汝參
