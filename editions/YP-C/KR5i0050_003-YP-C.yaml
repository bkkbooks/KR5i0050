body:
  text: 詩集上卷孚佑上帝純陽吕祖天師詩集古體詩戒殺歌我書戒殺歌奉勸世人讀物類形體殊豈甘遭慘毒利刄剌肝心尖刀割腸腹皮掀肉顫搖喉斷身顚撲血濺滿砧几悲號動墻屋鰻刴尙盤旋魚烹猶跳躍大痛何可伸極苦難逃脫諸獸牛不羣其形按列宿非彼代人耕農事倩誰役於世大有功何忍啖其肉馬匹載乘勞戰征亦爲國報曉賴德禽看家惟義畜更有幾微靈亦且倫常屬烏能返哺親羊且乳跪足雁有信義賓鱧知夜朝北大命須當憐小命亦無忽覩彼盤盂間億萬生靈逐活溺鹽醬中生投湯沸鑊一餐尙不飽入肚味難復何苦强搜求省口多積福曽見匿刀牛跪向屠人哭又言狗能言乞憐免割剥憐兒寸斷腸莫射山中鹿爲母肯投崖身碎田間犢鱔化黃衣童夢求厨下僕螺放水中光欲免舟人獲我曽昔爲儒典制雖未博茹毛飲血時上古無嘉穀相沿直至今流弊世相續然而不忍心宰割非所欲燔牛只祀天雞豚亦不數古有恤生人聊爲君一錄湯有解網恩齊能舍觳觫大哉孔子心不綱不射宿天子釋羔羊不忍無窮戮恩官禁澤梁號呼動水族微生能報人人亦當憐育蟻渡狀元橋鼠分宰相粟救雀報投環放鯉貢雙玉蛇啣梁上珠龜獻藏珍殻舍鼈救傷膚聚蠅出𡨚獄戒殺故有功殺生報亦確屠牛形似牛殺狗狗形托此日具人形轉眼生毛角輪迴實可憐早修今面目豈曰來世償眼前報又速如何有𡻕荒如何有命促如何有大火如何有異疫皆因殺孼多怨氣相感觸上帝震怒深降殃此五濁奉吿世人聽改卻前嗜欲推擴此仁心隨處皆忖度舉步恤蟲蟻憐蛾紗罩燭鹽水莫街傾滚湯毋地潑棲蟄莫輕殘卵胎毋損捉休傷穴與巢勿焚山共麓丹丸方劑時害命勿爲藥邪法戲術中傷生毋妄作養生莫害生金魚與鳥雀莫謂我言迂有功天必祿上帝最好生萬物皆恩沐仁心各自存毋曰我隨俗不能盡戒除漸減漸消惡不必盡蔬羹市脯亦不薄悲哉此曰書叮嚀再三囑若遇大丈夫永除滋味惑齋戒處終身清心易愼獨人能實力行夀考臻百福悟道歌數載樂幽幽欲逃寒暑逼不求名與利猶恐身心役苦志慕黃庭慇懃求道跡陰功暗心修善行長日積世路果逢師時人皆不識我師機行密懷量性孤僻解把五行移能將四象易傳余造化門始悟希夷則服取兩般眞從頭路端的烹煎日月壺不離乾坤側至道眼前觀得之元咫尺眞空空不空眞色色非色推倒玉葫蘆迸出黃金液𦂳把赤龍頭猛將驪珠吸吞歸臟腑中奪得神仙力妙號一黍珠延年千萬億同途聽我吟與道相親益未曉眞黃芽徒勞遊紫陌把住赤烏魅突出銀蟾魄未省此中玄常流容易測三天應有路九地終無厄守道且藏愚忘機要混迹羣生莫相輕已是蓬萊客遊天台山台山最奇特巉岩𥪡削壁千峯攢羽翠一水環玉碧橫架石梁橋如虹貫九霄波澄龍斂鬣松定鶴歸巢聞説避秦女不作襄王雨雲肌映月華霞珮隨風舉老衲採薇飡入定坐天龕桃隨飛澗煖柏鎻老岩寒石闕時時閉𡻕月應無記欲扣玄中玄卻鍊氣中氣忽聞空谷中音樂鳴天風萬壑人踪寂四時花色紅題像五首獨坐獨坐不離這箇這箇玄機誰能打破上下察之鳶飛魚躍天地訢合聖賢常樂世人坐破蒲團到底不歸正教誰知性裏摩尼在我丹田朗照揮塵風前色相行踪世外孤雲試透龍光三界掃除物我魔君無以色相何留此像偶倩毫端抺吾模樣咦好將寶劍倚崆峒除盡塵魔消礙障敲爻野客隱見莫測孤立乾坤逈照日月偶揮筆上春雲而發和光之訣噫要存色相應塵清洞庭秋水三千劫題石爲虎爲龍鍊泉鍊月堅則以磨濁則以激隨花鳥而忘機樂琴樽而自悅若是見得如來不須饒舌百句章無念方能靜靜中氣自平氣平息乃住息住自歸根歸根見本性見性始爲眞萬有無一臭地下聽雷鳴升到崑崙頂後路要分明下山接鵲橋送下至黃庭庭中演易卦五十五堪均氣卷施四大坐臥看君行此是築基理孤陰難上升更要鑄神劍三年鍊已成念正精忘極臨鑪不動神覔買丹房器五千四八春先看初三夜蛾眉始見庚要見庚花現反向蛾眉尋如此採眞鉛口口要眞傳火候從初一一兩漸漸生十六退陰符兩兩不見增沐浴逢雞兎防失防險傾金氣自薰蒸體上汗淋淋十月胎方就頂門要出神還須面壁九飛身上玉京三段功夫訣明明説與君我今親手釋成書體訣行傳與修行子玉金之法程丹訣眞師授須與神仙論更有妙丹法予恐太洩輕彈絃并鼓瑟夫妻和平情霞光照曲水紅日出崑崙恍恍并惚惚杳杳與㝠㝠此中眞有信信到君必驚一點如朱橘要使水銀迎絶不用器械顚倒法乾坤世人不悟理三峯採戰行也有説三關也有入鑪臨又以口對口醜穢不堪聽一切有爲法俱是地獄人有等執著者信死清淨眞髮黃并齒落鵲體似鶴形他未知吾道分明假作眞觀天之大道執天之大行月挂西川上霞臨南楚濱三日前爲晦陽中之純陰三日後爲朔陰中之陽精亦如逢冬至和景好陽春八日是上弦一問卯兔門十六方爲姤廿三是酉門以此參易卦方知大道眞百句章中字字字要尋文此書雷將守得者愼勿輕惜字歌字洩天地精字列聖賢名字散止一字字合卽名經字半皆有韻字全靈慧生先賢造諸字諸字由聖明字入汙泥處罪孼損年庚能生惜字念惜字勝修行肯惜一字紙積字福來增肯勸人惜字祿夀自天申肯勸肯惜報自古有明徵惜字若無報試觀勸世文勸文代代有字報人人聞爲勸惜字紙一字如藏經警世春去夏初交重雲遮白日湛然一道光盡被浮翳匿君子與小人同生休同立縱我不受污難以欺有識花忌蝶蜂侵稻粱仇蟊賊物也尙如斯人何憚愼密平橋感事我臨淮水上淒清動遠思烏鵲棲高樹雁鴻偏苦饑王孫日把釣一身無所資漂母垂憐際怎有酬金時丈夫不失路飛揚終不奇動心而忍性此意天所私贈夀生平懷坦易相與樂天眞好道本夙昔誰曰非性成千金曽不惜况復戀簪纓有子能讀書養晦守父經飛騰懸日待頭角並崢嶸琴瑟相繼諧遂願盡彜倫年當半百時嗜好邁紅塵一斗一石醉月弄復風吟奉法道無間暑寒爽氣神如斯道貌古入籍在蓬瀛蓬山多仙侣翹首企同心擕手駕白鶴天半朱霞生飛入夀者堂擎拳祝遐齡夏日言懷七首幼讀神仙傳飄然物外心浮名人所慕不覺艷華簪一朝遭聖主碌碌空浮沉自顧無時譽幽思反故林舉頭雲路近晨露滴清襟孤松生幽谷矯矯氷雪姿移植蓬蒿邉浮蔓交榮滋動節爲所屈哀哉非其時樵人利斧斤割盡旁附枝餐風吸日精終見生紫芝屈伸固有會志士願自持黃鶴乘雲去湖山憶舊遊乾坤殊浩蕩逝者無停休樹色侵波影漁歌起白鷗何當棄冠蓋從我訪璚樓吾愛陶貞白撥雲見天日養生非鍊形雅志同金石朝餐嶺上霞夕飲牀頭秫玉霄降青鸞眞誥膺帝錫似此山中宰屣棄三公秩君子貴知幾遁世方無失老君隱柱下未嘗卑小官孔子爲委吏會計分所安古人守一職常恐負荷難如何今人奢逐逐慕彈冠得隴又望蜀心中興汎瀾所以鍾離子俾我隱岡巒羽毛生長後不畏暑與寒枕中多幻夢寂寞興終闌道心須努力莫作等閒看八月乘槎客飄飄犯斗牛人生跼且蹐似此足壯遊年年明星燦不見客人舟夜夜猿聲急我心難寫憂安得韓眾來與之步瀛洲阮公晉狂士風流未足誇名教有樂地禮法不容差神仙累功行足跡滿天涯拯民并濟物願等恒河沙豈耽詩酒癖遽爾演三車遺孝子楊太明楊君眞確士孝行洞穹壤皇天憐其難七夕遣追往逡巡藥頑石遺子另饋享子旣不我受吾亦不加强風埃難少留願子志勿爽會當首鼠紀青雲看反掌勸丹士金守一五首眞假原難混終須復本形貪夫徒用計反自陷寒貧勸君休要燒鉛汞𡻕月徒擔送黃芽未必生白雪成何用伴紙灰如做了一場的蝴蝶夢伴紙灰如做了一場的蝴蝶夢三方鑪鼎空添火痴守文和武投胎爲養沙取氣難離母鎭日間打夭硫擔盡了多辛苦鎭日間打夭硫擔盡了多辛苦死砒乾汞尋燒藥自説通天法五金總不和八石終難合入明鑪過鉛池都是個乘波筏入明鑪過鉛池都是個乘波筏世間人説燒丹須用先成内豈知内就皆無累萬鎰不關心邱積非爲貴總然是點石金到底成磗塊總然是點石金到底成磗塊示通源偈八首死生原不二生卽死之門了得無生者生亦徒何云見性乃眞覺談禪是後天天從何所見佛卽未來心空空徒自空悟悟忘自悟撇卻悟空魔死生應自主三教總一教得來無欲同若從微妙處一點還虛空論道如來是大雄大雄必定也空空不增不減長江水照破須彌無相峯椿枝萬丈道家玄蓮花九品禪門法試問花飛椿老時可曽捉得西江月萬曡寒烟總是虛隔簾燈影卻何如此是認得空中幻卽是如來貝葉書舍利弗舍利弗最上菩提尋覺路不落千千四大千湼盤六六三十六時見層層七寶臺時隱密密雙行樹誰教控鶴老兒來飛錫趕到雲深處打醒通源問的端刹土應是恒河數如來不在見聞中圓覺聲聞何以故九品蓮花偈六首挺挺出金池瓣瓣含玉露火裏放奇香色比菩提固心卽臺之象蓮因色是身西方無個處極樂悟虛眞雙行樹裏泥團九品蓮中甘露頻伽不解無生飛向恒河深處昨夜天風吹北斗驪龍獅子一齊吼要見蓮花何處尋蓮花卻在如來口菩提無樹鏡無臺安得蓮花九品開分付通源休浪悟客塵二字證如來道人慣會饒舌要講蓮花顏色不長娑婆四部中不染青黃赤白黑時時入觀見如來柳花搖動瓔珞月偶偈七首慧光破三界慈波大海中金剛非法相般若應歸宗無我無人礙妙法自如如彌陀有圓覺九品是眞廬如來非有相在在心頭著悟卻本來因了我無生法一點琉璃光照破十方界了了歸虛空此中無𦊱礙何處獅子作怪將我葛藤咬壞要尋佛老塡還過去未來現在昨夜懶雲炊熟今朝癡腹生春有口無心是佛笑他忙裏尋人不貪不愛不惱無身無口無心從此一靈默會太虛清靜忘形覺源偈語先覺後覺道外無人和光齊固永守天眞有大心願覺源通神始終如一雨露日臻人名留在箇中存謁大士叅大乘禪法呈偈晃晃朗朗海心月圓圓融融無欠缺一朝輦出中天來萬古清暉昏夜白咦打破箇中舍利子任他遊衍何須歇爲杭州靈隱寺慧一僧火化偈莫著芒鞋亂行走好將雲衲自修藏須彌山上風光好回首曇花暗吐香休奔涉莫慌忙從今脫去臭皮囊大千界裏留眞跡極樂邦中日月長咦跳出愛河春日好阿那會上飲瓊漿鼎器歌鼎器本是男女身大藥原來精氣神若會攢來歸一處須用同心三箇人三箇人無他説只要眞師眞口訣指破陰陽三品丹方可存心待明月待明月也莫遲收拾身心且築基劈開塵心抛業網驅除五漏斬三尸斬三尸見鑄劍鍊已通靈知應驗剛柔變化任施爲萬里驅妖如掣電如掣電劍方靈挂向南方護水晶若遇北方陰鬼起一刀兩段不容情不容情常清靜心中皎潔如明鏡鏡心寂滅若虛空始得臨鑪無弊病無弊病可安鑪調和鼎器勿心粗言語不通非眷屬龍興虎旺始堪圖始堪圖觀復作音造鑿開混沌鴻濛竅靜觀虎嘯與龍吟自然華池神水到神水到辨浮沉莫教平聲時過枉勞心鉛遇癸生須急採金逢望遠不堪親不堪親休亂取地裂山崩難作主不知止足必傾危盛夏嚴霜冬大暑冬大暑不遭逢三寶牢關密守中太極自然生造化趁時搬取入黃宫入黃宫須愛護十月澆淋休失悞子行陽火虎龍交午退陰符自保固自保固暫相離端坐忘言更待時輻輳循環終則始三百六十莫違期莫違期爲則例悟明眞理須當契若還執著爻象行只恐勞神形蠧弊形蠧弊往來堅只爲心機未得閒思慮莫眞豪髮錯鉛銷汞散不成丹不成丹思鍊已