front:
  text: 呂帝詩集重刋道藏輯要
  hash: sha256:333119af9f035d33286950ca9253e9da7eb207922ba374a0c843c2c74b857a00
  markers:
  - {type: page-break, offset: 4, content: '', id: CK-KZ_KR5i0050_02p001a}
body:
  text: 詩集上卷目錄古體詩戒殺歌悟道歌遊天臺山題像五首題石百句章惜字歌警世平橋感事贈夀夏日言懷七首遺孝子楊太明勸丹士金守一五首示通源偈八首九品蓮花偈六首偶偈七首覺源偈語謁大士叅大乘禪法呈偈爲杭州靈隱寺慧一僧火化偈鼎器歌採金歌二首駕鶴歌放歌絶慾歌鄂渚悟道歌贈劉方處士題桐柏山黃先生菴門直指大丹歌窑頭坯歌贈喬二郎歌警世二帝祠夢醒軒戒淫歌鴻雁行戒食牛肉歌全眞歌放生歌覺世歌贈葉子歌一到歌一眞旨歌安雅堂歌過功歌大覺示體恕候鍾離祖師臨壇歌可惜歌五言律悟了詩十六首明胎息通道偕靈隱寺慧一僧遊洞霄宫梅花贈在園劉廷機春日山居五首立春早梅暮冬偶題三首示止源漁舟自咏偶吟二首讚道讚經讚師癸酉秋深卽事甲戌秋過蓮池律院七言律勸世吟二十七首偶題夜吟月夜繡毬二首秋夜紅梅瓶梅臘梅元宵夏日寓意嘯吟閒吟示眾修斗儀送允誠元誠回黔指示玄功示體恕二首遊金山寺示誠恕還楚示通源泛南海登落伽山雪厓洞和韻二首書淮郡紫霄宫壁無題一百十四首寒暮止源求詩咏此仙况二首還丹奥法坐卧幽况示引源示玄源示淵源示全眞守斗三首指玄篇十六首香烟偶結成雲雁蠟梅海上遊冬夜卽事贈左玄長史贈道旁苦人贈外科醫生贈内科醫生贈半舫居士雁字六十首長樂崶龍門留題五首偶題二首喜黔楚合會示黔楚合會示劉允誠鄧信誠勉學閒詠二首夜詠聽琴月夜訓人寄示示誠恕示誠恕遊黔偶題三首春日卽事詠紅杏夏日卽事三首五月五日寓意端陽秋日卽事秋夜桂花詠雪醒世二首宴罷二首再詣龍虎山訪道陵遺法詠松詠梅昔回鄕適遇𡻕荒罄貲產糧米賑濟饑貧得活數萬餘人鄕中耆老親屬勸存留貲產爲子孫計乃作此詩以示學人與衡山僧智玄題湖洲沈惟心家園亭壁上示悟眞偶題二首示天基
