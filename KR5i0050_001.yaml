front:
  text: 呂帝詩集吕帝詩集序易曰觀乎人文以化成天下化非文不顯也文之賅乎道乃能成化耳文之妙至無文之文爲極無文之妙又必顯徵於文其如雲漢之章天上日月之麗太空有象無象昭昭懸印亦何妙之能窮哉文之至妙百態千奇而肇始以及炳煥其猶岷山之導江由源以開流直至莫可紀極莫能象贊耳文之見於詩者起三百篇而極盛於吾唐吾唐之詩作者恒河沙數而動與道合隨緣成化一字一金針雖極之於千百億篇皆此一律者吾師乎吾師乎師之詩由本始以迄今日厯更朝代而心源直達無或少有變由詩之妙不以文著也道之大統寄於吾師師之心愿澈於至極非道不見於文乃卽文以徵諸詩其指初不越乎本愿其詩則發見於萬端有其作者述必待人要未易求諸一篇一言之末也師之詩流傳旣久載籍極博而神而明之未得會而通之今覺壇輯全詩於全書重訂功成較讐合度卽一詩集以成全璧合全書而乃爲大成此不關乎詞章之學亦不附於詩文以達也學者善自得師可於此求之矣湘不文今乘大會降壇獲覩全集卽此詩部略識數語以共証於高明之域也夫辛酉中秋日弟子韓湘謹書吕帝詩集題詞書曰詩言志歌永言詩與詞亦文類也我帝師之詩詞無一語不關合道妙誠能潛心默會則一字一金丹拈花之妙任人領取矣夫大羅天上之高眞以詩文成帙傳於世者推白紫淸海瓊集爲最著顧顯指丹法雖極精微猶爲上仙所同至若每發一語卽寓玄機無妙不澈無秘不傳者則億萬年來惟吾帝師一人而已噫九天之咳吐遍落珠璣眞如雨露之普施而人世之流傳曾不及什一於千百是亦緣會有待而然也前此刋刻全書收詩無幾且多割裂不盡畫一今覺源法壇重輯全書博採羣籍廣蒐珍秘其有見於聖蹟紀要中者不重編入集外統就所見分體排列將百倍於曩時所載之什爰命及門屢加詳校期無魯魚亥豕之訛俾讀者得由斯以作問道津梁是固當求之無聲之表而勿僅歎美於篇章字句間也
